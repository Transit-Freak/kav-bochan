<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- מונע מהדפדפן להגיש גרסה ישנה של הדף מה-cache. הקוד עצמו (KavPach.jsx,
     xlsx-worker.js) נטען עם חותמת גרסה (?v=) שמאלצת רענון בכל פריסה. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>קו פח – מאתרים קווים ריקים</title>
<link rel="icon" href="favicon.ico" />
<script src="vendor/tailwind.js"></script>
<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="vendor/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html { direction: rtl; }
  body {
    background: #F8FAFC;
    color: #0F172A;
    font-family: 'Assistant', 'Heebo', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    margin: 0;
  }
  @keyframes animate-in { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .animate-in { animation: animate-in .3s ease forwards; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .animate-spin { animation: spin 1s linear infinite; }
  @keyframes slide-in-from-right { from { opacity:0; transform: translateX(12px); } to { opacity:1; transform: translateX(0); } }
  .slide-in-from-right-4 { animation: slide-in-from-right .3s ease forwards; }
  .fade-in { animation: animate-in .5s ease forwards; }

  /* כרטיסים כבדים — הדפדפן מדלג על רינדור של כרטיסים מחוץ למסך
     ומחזיק עבורם רק "מקום שמור" עד שהם מתקרבים לתצוגה.
     contain-intrinsic-size נותן לדפדפן הערכת גובה כדי שהגלילה לא תקפוץ. */
  .vcard {
    content-visibility: auto;
    contain-intrinsic-size: 0 320px;
    contain: layout style paint;
  }
  .vrow {
    content-visibility: auto;
    contain-intrinsic-size: 0 120px;
    contain: layout style paint;
  }
  #boot-loader { position: fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#F8FAFC; z-index: 9999; gap: 16px; }
  #boot-loader .ring { width: 44px; height: 44px; border: 3px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
  #boot-loader .label { font-size: 14px; color: #64748b; }
</style>
</head>
<body>
  <div id="boot-loader">
    <div class="ring"></div>
    <div class="label">טוען את המערכת…</div>
  </div>
  <div id="root"></div>
  <!-- ?v= חותמת גרסה: עדכן בכל פריסת קוד כדי לאלץ הורדה מחדש (cache-busting) -->
  <script type="text/babel" src="KavPach.jsx?v=20260617r"></script>
  <script type="text/babel">
    (function mount(){
      function go(){
        if (typeof KavPach === 'undefined') { return setTimeout(go, 50); }
        const boot = document.getElementById('boot-loader');
        if (boot) boot.remove();
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KavPach />);
      }
      go();
    })();
  </script>
</body>
</html>
