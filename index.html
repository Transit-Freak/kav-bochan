     contain-intrinsic-size נותן לדפדפן הערכת גובה כדי שהגלילה לא תקפוץ. */
  .vcard {
    content-visibility: auto;
    contain-intrinsic-size: 0 320px;
    contain: layout style paint;
  }
  .vrow {

     זהה ולא תהיה "קפיצת" מיקום של האיורים בעת עליית React. */
  .choice-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
  @media (min-width: 768px) { .choice-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

  <!-- ?v= חותמת גרסה: עדכן בכל פריסת קוד כדי לאלץ הורדה מחדש (cache-busting) -->
  <script type="text/babel" src="KavPach.jsx?v=20260626c"></script>
  <script type="text/babel">
    (function mount(){
      function go(){
        if (typeof KavPach === 'undefined') { return setTimeout(go, 50); }
        const boot = document.getElementById('boot-loader');
        if (boot) boot.remove();
        const guard = document.getElementById('click-guard');
        if (guard) guard.remove();
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KavPach />);
      }
      go();
    })();
  </script>
