<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>קו פח – מאתרים קווים ריקים</title>
<link rel="icon" href="favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  html { direction: rtl; }
  body {
    background: #F8FAFC;
    color: #0F172A;
    font-family: 'Assistant', 'Heebo', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    margin: 0;
  }
  @keyframes animate-in { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .animate-in { animation: animate-in .3s ease forwards; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .animate-spin { animation: spin 1s linear infinite; }
  @keyframes slide-in-from-right { from { opacity:0; transform: translateX(12px); } to { opacity:1; transform: translateX(0); } }
  .slide-in-from-right-4 { animation: slide-in-from-right .3s ease forwards; }
  .fade-in { animation: animate-in .5s ease forwards; }
  #boot-loader { position: fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#F8FAFC; z-index: 9999; gap: 16px; }
  #boot-loader .ring { width: 44px; height: 44px; border: 3px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
  #boot-loader .label { font-size: 14px; color: #64748b; }
</style>
</head>
<body>
  <div id="boot-loader">
    <div class="ring"></div>
    <div class="label">טוען את המערכת…</div>
  </div>
  <div id="root"></div>
  <script type="text/babel" src="KavPach.jsx"></script>
  <script type="text/babel">
    (function mount(){
      function go(){
        if (typeof KavPach === 'undefined') { return setTimeout(go, 50); }
        const boot = document.getElementById('boot-loader');
        if (boot) boot.remove();
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KavPach />);
      }
      go();
    })();
  </script>
</body>
</html>
