<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>פרוטוטייפ · ניתוח תחבורה עירוני</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:"Assistant",system-ui,Arial,sans-serif;background:#0f172a;color:#e2e8f0}
  header{padding:14px 16px;background:#1e293b;border-bottom:1px solid #334155}
  h1{margin:0;font-size:20px}
  .sub{color:#94a3b8;font-size:13px;margin-top:3px}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:12px 16px;background:#111827;border-bottom:1px solid #334155}
  select{background:#0b1220;color:#e2e8f0;border:1px solid #334155;border-radius:9px;padding:9px 12px;font:inherit;font-weight:700;min-width:180px}
  .cards{display:flex;gap:10px;flex-wrap:wrap;padding:14px 16px}
  .card{flex:1;min-width:150px;background:#1e293b;border:1px solid #334155;border-radius:13px;padding:12px 14px}
  .card b{display:block;font-size:24px;font-weight:900;line-height:1.1}
  .card span{font-size:12.5px;color:#94a3b8;font-weight:700}
  .rec{margin:6px 16px 0;background:#0b2545;border:1px solid #1d4ed8;border-radius:12px;padding:12px 14px;font-size:13.5px;line-height:1.7}
  .rec b{color:#fff}
  .list{padding:8px 12px 40px}
  .row{display:grid;grid-template-columns:54px 1fr auto;gap:10px;align-items:center;background:#1e293b;border:1px solid #334155;border-radius:11px;padding:9px 12px;margin:7px 0}
  .ln{font-family:monospace;font-weight:900;font-size:17px;background:#334155;border-radius:8px;padding:6px 0;text-align:center}
  .nm{font-weight:800}
  .meta{font-size:12px;color:#94a3b8;margin-top:2px}
  .tag{font-size:12px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .bad{background:#7f1d1d;color:#fecaca}.good{background:#064e3b;color:#a7f3d0}.ok{background:#334155;color:#cbd5e1}.warn{background:#78350f;color:#fed7aa}
  .muted{color:#64748b;font-size:12px;padding:0 16px}
</style>
</head>
<body>
<header>
  <h1>🚍 ניתוח תחבורה עירוני — פרוטוטייפ</h1>
  <div class="sub">מבוסס על נתוני נוסעים/עלות/עומס של משרד התחבורה. מאתר קווים מבזבזים, יעילים ועמוסים לכל עיר.</div>
</header>
<div class="bar">
  <span>עיר:</span>
  <select id="city"></select>
  <span id="status" class="muted">טוען…</span>
</div>
<div class="cards" id="cards"></div>
<div class="rec" id="rec" style="display:none"></div>
<div class="list" id="list"></div>
<div class="muted">מתודולוגיה: "עלות לנוסע" מול ממוצע ארצי (~₪35). מבזבז = עלות גבוהה לנוסע; יעיל = עלות נמוכה; עמוס = עומס-שיא גבוה יחסית בעיר. פרוטוטייפ — לא רשמי.</div>

<script>
const COL={makat:0,line:1,dir:2,origin:3,dest:4,district:5,type:6,uniq:7,op:8,dist:9,trips:10,cost:11,wkm:12,bus:13,excl:14,rid:15,peak:16};
const NAT=35; // benchmark ארצי לעלות-לנוסע
let DATA=[];
const $=id=>document.getElementById(id);
const nf=n=>n==null?'—':n.toLocaleString('he-IL',{maximumFractionDigits:1});

fetch('../data-main.json').then(r=>r.json()).then(d=>{
  DATA=d;
  const counts={};
  d.forEach(r=>{const c=r[COL.origin];if(c)counts[c]=(counts[c]||0)+1;});
  const cities=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  $('city').innerHTML=cities.map(c=>`<option value="${c}">${c} (${counts[c]})</option>`).join('');
  $('status').textContent=`${d.length.toLocaleString()} קווים · ${cities.length} ערים`;
  $('city').onchange=()=>render($('city').value);
  render(cities[0]);
}).catch(e=>{$('status').textContent='שגיאה בטעינת הנתונים: '+e;});

function render(city){
  // aggregate rows of this city by line number (combine directions)
  const lines={};
  DATA.filter(r=>r[COL.origin]===city).forEach(r=>{
    const k=r[COL.line]; if(!lines[k])lines[k]={line:k,dest:'',type:r[COL.type],cost:[],rid:0,peak:0,trips:0};
    const L=lines[k];
    if(r[COL.dest]&&r[COL.dest]!==city)L.dest=r[COL.dest];
    const c=r[COL.cost]; if(typeof c==='number'&&c>0)L.cost.push(c);
    if(typeof r[COL.rid]==='number')L.rid+=r[COL.rid];
    if(typeof r[COL.peak]==='number')L.peak=Math.max(L.peak,r[COL.peak]);
    L.trips+=(typeof r[COL.trips]==='number'?r[COL.trips]:0);
  });
  let arr=Object.values(lines).map(L=>({...L,cost:L.cost.length?L.cost.reduce((a,b)=>a+b,0)/L.cost.length:null}));
  // crowding threshold: top 20% peak in this city
  const peaks=arr.map(l=>l.peak).filter(x=>x>0).sort((a,b)=>a-b);
  const crowdTh=peaks.length?peaks[Math.floor(peaks.length*0.8)]:Infinity;

  const withCost=arr.filter(l=>l.cost!=null);
  const avgCost=withCost.length?withCost.reduce((a,l)=>a+l.cost,0)/withCost.length:null;
  const wasteful=arr.filter(l=>l.cost!=null&&l.cost>60);
  const efficient=arr.filter(l=>l.cost!=null&&l.cost<13);
  const crowded=arr.filter(l=>l.peak>=crowdTh&&l.peak>0);

  $('cards').innerHTML=[
    ['#fff',arr.length,'קווים בעיר'],
    [avgCost>NAT?'#f87171':'#4ade80', '₪'+nf(avgCost),'עלות ממוצעת לנוסע (ארצי ₪35)'],
    ['#f87171',wasteful.length,'קווים מבזבזים (₪60+ לנוסע)'],
    ['#4ade80',efficient.length,'קווים יעילים (פחות מ-₪13)'],
    ['#fbbf24',crowded.length,'קווים עמוסים'],
  ].map(([c,b,s])=>`<div class="card"><b style="color:${c}">${typeof b==='number'?b.toLocaleString():b}</b><span>${s}</span></div>`).join('');

  const rec=[];
  if(wasteful.length) rec.push(`🗑️ <b>${wasteful.length} קווים מבזבזים</b> (עלות גבוהה לנוסע, ניצול נמוך) — מועמדים לבחינה: איחוד, קיצוץ תדירות, או שינוי מסלול. הגבוהים: ${wasteful.sort((a,b)=>b.cost-a.cost).slice(0,3).map(l=>'קו '+l.line+' (₪'+nf(l.cost)+')').join(', ')}.`);
  if(crowded.length) rec.push(`🔴 <b>${crowded.length} קווים עמוסים</b> — מועמדים להגברת תדירות / אוטובוס גדול יותר: ${crowded.sort((a,b)=>b.peak-a.peak).slice(0,3).map(l=>'קו '+l.line).join(', ')}.`);
  if(efficient.length) rec.push(`🏆 <b>${efficient.length} קווים יעילים</b> — לשמר/לחזק.`);
  $('rec').style.display=rec.length?'block':'none';
  $('rec').innerHTML=rec.join('<br>');

  arr.sort((a,b)=>(b.cost||0)-(a.cost||0));
  $('list').innerHTML=arr.map(l=>{
    let tag,cls;
    if(l.cost==null){tag='— ללא נתון';cls='ok';}
    else if(l.cost>60){tag='🗑️ מבזבז';cls='bad';}
    else if(l.cost<13){tag='🏆 יעיל';cls='good';}
    else{tag='✓ תקין';cls='ok';}
    const crowd=l.peak>=crowdTh&&l.peak>0?' <span class="tag warn">🔴 עמוס</span>':'';
    return `<div class="row">
      <div class="ln">${l.line}</div>
      <div><div class="nm">${city} ${l.dest?'→ '+l.dest:''} <span style="color:#64748b">· ${l.type}</span></div>
      <div class="meta">עלות לנוסע: <b style="color:#e2e8f0">₪${nf(l.cost)}</b> · נוסעים: ${nf(l.rid)} · עומס-שיא: ${nf(l.peak)} · נסיעות/שבוע: ${nf(l.trips)}</div></div>
      <div style="text-align:left"><span class="tag ${cls}">${tag}</span>${crowd}</div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
