name: probe-realtime

# שולף את האיחור האמיתי (etaDiffTimes/difMin) של רכבת 172 מ-rail.co.il. דוחף ל-probe-realtime-out.

on:
  push:
    paths:
      - '.github/workflows/probe-realtime.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: probe-realtime
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Pull train 172 live delay from rail.co.il
        run: |
          set +e
          python3 - <<'PY'
          import json, urllib.request, urllib.error, datetime
          out=[]
          def log(s): print(s); out.append(str(s))
          KEY="5e64d66cf03f4547bcac5de2de06b566"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          URL="https://rail-api.rail.co.il/rjpa/api/v1/timetable/searchTrain"
          today=datetime.date.today().isoformat()

          # station name map (best effort)
          names={}
          for u in ["https://rail-api.rail.co.il/common/api/v1/stations",
                    "https://rail-api.rail.co.il/rjpa/api/v1/stations"]:
              try:
                  req=urllib.request.Request(u, headers={"ocp-apim-subscription-key":KEY,"user-agent":UA,
                      "origin":"https://www.rail.co.il","referer":"https://www.rail.co.il/"})
                  j=json.load(urllib.request.urlopen(req,timeout=30))
                  recs=j.get("result") or j
                  if isinstance(recs,list):
                      for s in recs:
                          sid=s.get("stationId") or s.get("id"); nm=s.get("stationName") or s.get("name")
                          if sid and nm: names[str(sid)]=nm
                  if names: log("stations map: %d (from %s)"%(len(names),u)); break
              except Exception as e:
                  log("stations %s -> %r"%(u,e))

          def search(frm,to,hour):
              body={"fromStation":str(frm),"toStation":str(to),"date":today,"hour":hour,
                    "scheduleType":"ByDeparture","systemType":"2","languageId":"Hebrew"}
              req=urllib.request.Request(URL, data=json.dumps(body).encode(), headers={
                  "content-type":"application/json","ocp-apim-subscription-key":KEY,
                  "origin":"https://www.rail.co.il","referer":"https://www.rail.co.il/",
                  "user-agent":UA,"accept":"application/json"})
              with urllib.request.urlopen(req,timeout=40) as r: return json.load(r)

          # try station pairs that train 172 (Modiin Merkaz -> Nahariya, dep 15:48) passes
          pairs=[("4600","700","15:00"),("4600","700","15:30"),("3700","700","15:30"),("680","700","15:00")]
          found=None
          for frm,to,hr in pairs:
              try:
                  j=search(frm,to,hr)
                  travels=(j.get("result") or {}).get("travels") or []
                  log("query %s->%s @%s : %d travels"%(frm,to,hr,len(travels)))
                  for t in travels:
                      for x in (t.get("trains") or []):
                          if str(x.get("trainNumber"))=="172":
                              found=x; break
                      if found: break
                  if found: log("  >>> found train 172 via %s->%s"%(frm,to)); break
              except Exception as e:
                  log("query %s->%s -> %r"%(frm,to,e))
          log("")
          if found:
              log("=== רכבת 172 — נתון חי מ-rail.co.il ===")
              log("orign=%s dest=%s dep=%s arr=%s"%(found.get("orignStation"),found.get("destinationStation"),
                                                    found.get("departureTime"),found.get("arrivalTime")))
              eta=found.get("etaDiffTimes") or []
              log("etaDiffTimes (%d ערכים):"%len(eta))
              maxd=0
              for e in eta:
                  sid=str(e.get("stationId")); dm=e.get("difMin")
                  log("   תחנה %s (%s): איחור %s דק'"%(sid, names.get(sid,"?"), dm))
                  try: maxd=max(maxd,int(dm))
                  except: pass
              log("")
              log("** האיחור הנוכחי של רכבת 172: %d דקות **"%maxd)
              json.dump(found, open("train172.json","w"), ensure_ascii=False, indent=1)
          else:
              log("לא נמצאה רכבת 172 בשאילתות. דוגמת trainNumbers שכן נמצאו:")
              try:
                  j=search("4600","700","15:00"); tv=(j.get("result") or {}).get("travels") or []
                  nums=[str(x.get("trainNumber")) for t in tv for x in (t.get("trains") or [])]
                  log("   %s"%nums[:20])
                  json.dump(j, open("train172.json","w"), ensure_ascii=False, indent=1)
              except Exception as e: log("   %r"%e)
          open("probe-report.txt","w").write("\n".join(out))
          PY
          ls -la probe-report.txt 2>/dev/null || true
      - name: Push results
        run: |
          set -euo pipefail
          cp probe-report.txt /tmp/r.txt 2>/dev/null || echo "no report">/tmp/r.txt
          cp train172.json /tmp/t.json 2>/dev/null || echo '{}'>/tmp/t.json
          git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan probe-out6; git reset
          find . -maxdepth 1 -mindepth 1 -not -name '.git' -exec rm -rf {} +
          cp /tmp/r.txt probe-report.txt; cp /tmp/t.json train172.json
          git add -A; git commit -m "train 172 live etaDiffTimes from rail.co.il"
          git push -f origin probe-out6:probe-realtime-out
