name: probe-realtime

# בדיקה ממוקדת לרכבת 172: לוח-זמנים מ-GTFS + מיקום חי מ-SIRI (Open Bus) + חישוב איחור.
# התוצאה נדחפת לענף probe-realtime-out.

on:
  push:
    paths:
      - '.github/workflows/probe-realtime.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: probe-realtime
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Download GTFS (routes/trips/stops)
        run: |
          set -euo pipefail
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          curl -fSL --connect-timeout 30 --max-time 900 --retry 2 -A "$UA" -o gtfs.zip \
            "https://gtfs.mot.gov.il/gtfsfiles/israel-public-transportation.zip"
          unzip -o gtfs.zip routes.txt trips.txt stops.txt
          ls -la routes.txt trips.txt stops.txt

      - name: Analyze train 172 vs live SIRI
        run: |
          set +e
          python3 - <<'PY'
          import csv, json, urllib.request, urllib.parse, datetime, subprocess, io, math
          out=[]
          def log(s): print(s); out.append(str(s))
          TRAIN="172"

          # ---- rail routes ----
          rail=set()
          for r in csv.DictReader(open('routes.txt',encoding='utf-8-sig')):
              if r.get('route_type')=='2': rail.add(r['route_id'])
          log("rail routes: %d"%len(rail))

          # ---- trips with headsign == 172 ----
          trips={}
          for r in csv.DictReader(open('trips.txt',encoding='utf-8-sig')):
              if r['route_id'] in rail and (r.get('trip_headsign') or '').strip()==TRAIN:
                  trips[r['trip_id']]=r['route_id']
          log("rail trips with headsign %s: %d  (ids: %s)"%(TRAIN,len(trips),list(trips)[:6]))

          # ---- stops ----
          stopinfo={}
          for r in csv.DictReader(open('stops.txt',encoding='utf-8-sig')):
              try: stopinfo[r['stop_id']]=(r['stop_name'],float(r['stop_lat']),float(r['stop_lon']))
              except: pass

          # ---- scheduled stop_times for those trips (stream the huge file) ----
          tset=set(trips); sched={}
          p=subprocess.Popen('unzip -p gtfs.zip stop_times.txt',shell=True,stdout=subprocess.PIPE)
          rdr=io.TextIOWrapper(p.stdout,encoding='utf-8-sig'); head=None; idx={}
          for raw in rdr:
              if head is None:
                  head=raw.strip().split(','); idx={h:i for i,h in enumerate(head)}; continue
              f=raw.rstrip('\n').split(',')
              tid=f[idx['trip_id']]
              if tid in tset:
                  t=(f[idx['departure_time']] or f[idx['arrival_time']] or '')[:5]
                  sched.setdefault(tid,[]).append((int(f[idx['stop_sequence']]),f[idx['stop_id']],t))
          p.wait()
          for tid in sched: sched[tid].sort()
          for tid,arr in list(sched.items())[:3]:
              line=" → ".join((stopinfo.get(s[1],('?',0,0))[0])+"@"+s[2] for s in arr)
              log("SCHEDULE trip %s: %s"%(tid,line))

          # ---- live SIRI (operator_ref 2 = רכבת ישראל) ----
          B="https://open-bus-stride-api.hasadna.org.il"
          def get(path):
              return json.load(urllib.request.urlopen(urllib.request.Request(B+path,headers={'user-agent':'probe'}),timeout=120))
          now=datetime.datetime.utcnow()
          frm=(now-datetime.timedelta(hours=4)).strftime('%Y-%m-%dT%H:%M:%SZ')
          q="/siri_vehicle_locations/list?"+urllib.parse.urlencode({
              'siri_routes__operator_refs':'2','recorded_at_time_from':frm,
              'limit':3000,'order_by':'recorded_at_time desc'})
          try: vl=get(q)
          except Exception as e: vl=[]; log("SIRI query failed: %r"%e)
          log("")
          log("live RAIL vehicle locations (last 4h): %d"%len(vl))
          jrs={}
          for v in vl:
              j=v.get('siri_ride__journey_ref'); jrs[j]=jrs.get(j,0)+1
          log("distinct rail journey_refs live now: %d"%len(jrs))
          log("sample journey_refs: %s"%json.dumps(list(jrs.items())[:15],ensure_ascii=False))

          # ---- match train 172 ----
          match=[v for v in vl if v.get('siri_ride__journey_ref') in tset]
          how="journey_ref==trip_id"
          if not match:
              match=[v for v in vl if TRAIN in str(v.get('siri_ride__journey_ref') or '')]; how="journey_ref contains 172"
          log("")
          log("matches for train 172 (%s): %d"%(how,len(match)))

          def hav(a,b,c,d):
              R=6371000;p=math.pi/180
              return 2*R*math.asin(math.sqrt(math.sin((c-a)*p/2)**2+math.cos(a*p)*math.cos(c*p)*math.sin((d-b)*p/2)**2))

          if match:
              match.sort(key=lambda v:v.get('recorded_at_time') or '', reverse=True)
              v=match[0]
              json.dump(v, open('match.json','w'), ensure_ascii=False, indent=1)
              lat,lon=v['lat'],v['lon']; rec=v.get('recorded_at_time')
              log("LATEST live point: lat=%s lon=%s recorded=%s vel=%s"%(lat,lon,rec,v.get('velocity')))
              # nearest scheduled stop of train 172
              tid=v.get('siri_ride__journey_ref')
              arr=sched.get(tid) or (list(sched.values())[0] if sched else [])
              best=None
              for seq,sid,t in arr:
                  nm,sla,slo=stopinfo.get(sid,('?',0,0))
                  if sla:
                      d=hav(lat,lon,sla,slo)
                      if best is None or d<best[0]: best=(d,nm,t)
              if best and rec:
                  # recorded is UTC; Israel = UTC+3 (June/IDT)
                  try: ru=datetime.datetime.fromisoformat(rec.replace('Z','+00:00'))
                  except: ru=now.replace(tzinfo=datetime.timezone.utc)
                  local=ru.astimezone(datetime.timezone(datetime.timedelta(hours=3)))
                  hh,mm=best[2].split(':'); sched_dt=local.replace(hour=int(hh),minute=int(mm),second=0,microsecond=0)
                  delay=(local-sched_dt).total_seconds()/60
                  log("")
                  log("=== רכבת 172 — חישוב איחור ===")
                  log("התחנה הקרובה לרכבת כעת: %s (%dמ' מהמיקום החי)"%(best[1],best[0]))
                  log("מתוכננת שם בשעה: %s | בפועל (לפי המדידה החיה): %s"%(best[2],local.strftime('%H:%M')))
                  log("** איחור משוער: %.0f דקות **"%delay)
          else:
              log("רכבת 172 לא נמצאה בזרם החי כעת — כנראה לא נוסעת ברגע זה.")
              log("רכבות אחרות שחיות עכשיו (journey_refs): %s"%json.dumps(list(jrs.keys())[:10],ensure_ascii=False))

          open("probe-report.txt","w").write("\n".join(out))
          PY
          ls -la probe-report.txt match.json 2>/dev/null || true

      - name: Push results
        run: |
          set -euo pipefail
          cp probe-report.txt /tmp/probe-report.txt 2>/dev/null || echo "no report" > /tmp/probe-report.txt
          cp match.json /tmp/match.json 2>/dev/null || echo '{}' > /tmp/match.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan probe-out3
          git reset
          find . -maxdepth 1 -mindepth 1 -not -name '.git' -exec rm -rf {} +
          cp /tmp/probe-report.txt ./probe-report.txt
          cp /tmp/match.json ./match.json
          git add -A
          git commit -m "train 172 realtime probe"
          git push -f origin probe-out3:probe-realtime-out
