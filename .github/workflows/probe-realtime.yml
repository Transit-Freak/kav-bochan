name: probe-realtime

# בדיקת-מידע בלבד (לא נוגע באתר): מתאים רכבות חיות (SIRI) ל-GTFS לפי מסלול+שעת-יציאה,
# ומחשב איחור אמיתי. מתמקד ברכבת 172, ומדגים גם על רכבות חיות אחרות.

on:
  push:
    paths:
      - '.github/workflows/probe-realtime.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: probe-realtime
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Download GTFS pieces
        run: |
          set -euo pipefail
          curl -fSL --max-time 900 --retry 2 -A "Mozilla/5.0" -o gtfs.zip \
            "https://gtfs.mot.gov.il/gtfsfiles/israel-public-transportation.zip"
          unzip -o gtfs.zip routes.txt trips.txt stops.txt

      - name: Match live rail to schedule and compute delay
        run: |
          set +e
          python3 - <<'PY'
          import csv, json, urllib.request, urllib.parse, datetime, subprocess, io, math
          out=[];
          def log(s): print(s); out.append(str(s))
          TRAIN="172"
          rail=set(r['route_id'] for r in csv.DictReader(open('routes.txt',encoding='utf-8-sig')) if r.get('route_type')=='2')
          railtrip={}; headsign={}
          for r in csv.DictReader(open('trips.txt',encoding='utf-8-sig')):
              if r['route_id'] in rail:
                  railtrip[r['trip_id']]=r['route_id']; headsign[r['trip_id']]=(r.get('trip_headsign') or '').strip()
          log("rail trips: %d"%len(railtrip))
          stopinfo={}
          for r in csv.DictReader(open('stops.txt',encoding='utf-8-sig')):
              try: stopinfo[r['stop_id']]=(r['stop_name'],float(r['stop_lat']),float(r['stop_lon']))
              except: pass
          # schedules for all rail trips
          sched={}
          p=subprocess.Popen('unzip -p gtfs.zip stop_times.txt',shell=True,stdout=subprocess.PIPE)
          rdr=io.TextIOWrapper(p.stdout,encoding='utf-8-sig'); head=None; ix={}
          for raw in rdr:
              if head is None: head=raw.strip().split(','); ix={h:i for i,h in enumerate(head)}; continue
              f=raw.rstrip('\n').split(',')
              tid=f[ix['trip_id']]
              if tid in railtrip:
                  t=(f[ix['departure_time']] or f[ix['arrival_time']] or '')[:5]
                  sched.setdefault(tid,[]).append((int(f[ix['stop_sequence']]),f[ix['stop_id']],t))
          p.wait()
          for tid in sched: sched[tid].sort()
          # index: (route_id, first_dep HH:MM) -> trip_id
          idx={}
          for tid,arr in sched.items():
              if arr: idx[(railtrip[tid],arr[0][2])]=tid
          tid172=next((t for t in railtrip if headsign[t]==TRAIN), None)
          log("train 172 trip_id: %s, route: %s, dep: %s"%(tid172, railtrip.get(tid172), sched.get(tid172,[['','','?']])[0][2]))

          # live SIRI rail
          B="https://open-bus-stride-api.hasadna.org.il"
          def get(path): return json.load(urllib.request.urlopen(urllib.request.Request(B+path,headers={'user-agent':'probe'}),timeout=120))
          now=datetime.datetime.utcnow()
          frm=(now-datetime.timedelta(hours=5)).strftime('%Y-%m-%dT%H:%M:%SZ')
          vl=get("/siri_vehicle_locations/list?"+urllib.parse.urlencode({'siri_routes__operator_refs':'2','recorded_at_time_from':frm,'limit':5000,'order_by':'recorded_at_time desc'}))
          log("live rail locations (5h): %d"%len(vl))
          # group by ride, keep latest location per ride
          rides={}
          for v in vl:
              rid=v.get('siri_ride__id')
              if rid not in rides or (v.get('recorded_at_time') or '')>(rides[rid].get('recorded_at_time') or ''):
                  rides[rid]=v
          log("distinct live rail rides: %d"%len(rides))
          # sample line_ref vs route membership
          smp=list(rides.values())[:1]
          if smp: log("sample ride: line_ref=%s scheduled_start=%s"%(smp[0].get('siri_route__line_ref'),smp[0].get('siri_ride__scheduled_start_time')))

          IL=datetime.timezone(datetime.timedelta(hours=3))
          def hav(a,b,c,d):
              R=6371000;p=math.pi/180
              return 2*R*math.asin(math.sqrt(math.sin((c-a)*p/2)**2+math.cos(a*p)*math.cos(c*p)*math.sin((d-b)*p/2)**2))
          def delay_for(v):
              # map ride -> trip via (line_ref, scheduled_start HH:MM)
              ss=v.get('siri_ride__scheduled_start_time') or ''
              hhmm=ss[11:16] if len(ss)>=16 else ''
              lr=str(v.get('siri_route__line_ref'))
              tid=idx.get((lr,hhmm))
              if not tid:  # fallback: any rail trip starting at that minute
                  tid=next((t for (r,h),t in idx.items() if h==hhmm), None)
              if not tid or not v.get('recorded_at_time'): return None
              arr=sched[tid]
              best=None
              for seq,sid,t in arr:
                  nm,la,lo=stopinfo.get(sid,('?',0,0))
                  if la:
                      d=hav(v['lat'],v['lon'],la,lo)
                      if best is None or d<best[0]: best=(d,nm,t)
              if not best: return None
              ru=datetime.datetime.fromisoformat(v['recorded_at_time'].replace('Z','+00:00')).astimezone(IL)
              hh,mm=best[2].split(':'); sd=ru.replace(hour=int(hh)%24,minute=int(mm),second=0,microsecond=0)
              dly=round((ru-sd).total_seconds()/60)
              return {'train':headsign.get(tid),'tid':tid,'near':best[1],'dist':round(best[0]),'sched':best[2],'actual':ru.strftime('%H:%M'),'delay':dly}

          # train 172 specifically
          found172=None
          for v in rides.values():
              r=delay_for(v)
              if r and r['train']==TRAIN: found172=(v,r); break
          log("")
          if found172:
              v,r=found172
              json.dump(v,open('match.json','w'),ensure_ascii=False,indent=1)
              log("=== רכבת 172 — חיה עכשיו! ===")
              log("ליד תחנת %s | מתוכננת שם %s | בפועל %s | איחור: %s דק'"%(r['near'],r['sched'],r['actual'],r['delay']))
          else:
              log("רכבת 172 לא נוסעת ברגע זה (לוח: 15:48–18:13). מדגים על רכבות חיות אחרות:")
              shown=0
              for v in rides.values():
                  r=delay_for(v)
                  if r and r['train']:
                      log("  רכבת %s | ליד %s | מתוכנן %s בפועל %s | איחור %s דק'"%(r['train'],r['near'],r['sched'],r['actual'],r['delay']))
                      shown+=1
                  if shown>=8: break
              if not shown: log("  (לא הצלחתי למפות אף רכבת חיה לטריפ — צריך לבדוק את התאמת line_ref)")
          open("probe-report.txt","w").write("\n".join(out))
          PY
          ls -la probe-report.txt match.json 2>/dev/null || true

      - name: Push results
        run: |
          set -euo pipefail
          cp probe-report.txt /tmp/r.txt 2>/dev/null || echo "no report">/tmp/r.txt
          cp match.json /tmp/m.json 2>/dev/null || echo '{}'>/tmp/m.json
          git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan probe-out4; git reset
          find . -maxdepth 1 -mindepth 1 -not -name '.git' -exec rm -rf {} +
          cp /tmp/r.txt probe-report.txt; cp /tmp/m.json match.json
          git add -A; git commit -m "train 172 realtime probe v2"
          git push -f origin probe-out4:probe-realtime-out
