name: probe-realtime

# בדיקה: מאיפה מגיעים נתוני האיחורים בזמן אמת.
# בודק את Open Bus / הסדנא (Stride API) שמרכז את ה-SIRI של משרד התחבורה —
# מחפש סוכנות "רכבת ישראל", דוגם מיקומי-רכב חיים, ובודק שדות חיזוי/איחור.
# התוצאה נדחפת לענף probe-realtime-out.

on:
  push:
    paths:
      - '.github/workflows/probe-realtime.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: probe-realtime
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Probe Open Bus / Hasadna Stride API for rail real-time
        run: |
          set +e
          python3 - <<'PY'
          import json, urllib.request, urllib.parse, datetime
          out=[]
          def log(s): print(s); out.append(str(s))
          B="https://open-bus-stride-api.hasadna.org.il"
          def get(path, timeout=60):
              req=urllib.request.Request(B+path, headers={'user-agent':'probe','accept':'application/json'})
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return json.load(r)

          # ---- 0) reachability ----
          log("=== Open Bus Stride API: %s ==="%B)
          try:
              get("/gtfs_agencies/list?limit=1"); log("API reachable: OK")
          except Exception as e:
              log("API NOT reachable: %r"%e)

          # ---- 1) agencies — find the rail operator ----
          rail_ops=[]
          try:
              ag=get("/gtfs_agencies/list?limit=500")
              log("gtfs agencies: %d"%len(ag))
              for a in ag:
                  nm=a.get('agency_name') or ''
                  if 'רכבת' in nm or 'rail' in nm.lower():
                      rail_ops.append(a); log("  RAIL agency: %s"%json.dumps(a, ensure_ascii=False))
              if not rail_ops: log("  no agency name contains רכבת/rail")
          except Exception as e:
              log("agencies failed: %r"%e)

          # ---- 2) sample a live SIRI vehicle location — what delay/prediction fields exist? ----
          try:
              vl=get("/siri_vehicle_locations/list?limit=3&order_by=id%20desc")
              log("")
              log("siri_vehicle_locations sample count: %d"%len(vl))
              if vl:
                  log("FIELDS: %s"%sorted(vl[0].keys()))
                  json.dump(vl[0], open("siri_sample.json","w"), ensure_ascii=False, indent=1)
                  hot=[k for k in vl[0] if any(w in k.lower() for w in ('predict','scheduled','delay','recorded','expected','actual'))]
                  log("prediction/delay-ish fields: %s"%(hot or 'NONE'))
          except Exception as e:
              log("vehicle_locations failed: %r"%e)

          # ---- 3) is RAIL present in the live SIRI stream? ----
          # siri_rides carry operator_ref; cross with rail agency_id
          try:
              # recent siri rides, look at distinct operator_refs
              rides=get("/siri_rides/list?limit=200&order_by=id%20desc")
              ops={}
              for r in rides:
                  o=r.get('siri_route__operator_ref') or r.get('operator_ref')
                  ops[o]=ops.get(o,0)+1
              log("")
              log("distinct operator_refs in last 200 siri rides: %s"%json.dumps(ops))
              rail_ids={str(a.get('agency_id')) for a in rail_ops}
              log("rail agency_id(s): %s"%rail_ids)
              hit=[o for o in ops if str(o) in rail_ids]
              log("** rail present in live SIRI rides? %s"%("YES: "+str(hit) if hit else "NO (rail not in the SIRI stream sample)"))
          except Exception as e:
              log("siri_rides failed: %r"%e)

          open("probe-report.txt","w").write("\n".join(out))
          PY
          ls -la probe-report.txt siri_sample.json 2>/dev/null || true

      - name: Push results to probe-realtime-out branch
        run: |
          set -euo pipefail
          cp probe-report.txt /tmp/probe-report.txt 2>/dev/null || echo "no report" > /tmp/probe-report.txt
          cp siri_sample.json /tmp/siri_sample.json 2>/dev/null || echo '{}' > /tmp/siri_sample.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan probe-out2
          git reset
          find . -maxdepth 1 -mindepth 1 -not -name '.git' -exec rm -rf {} +
          cp /tmp/probe-report.txt ./probe-report.txt
          cp /tmp/siri_sample.json ./siri_sample.json
          git add -A
          git commit -m "realtime probe results (open bus / siri)"
          git push -f origin probe-out2:probe-realtime-out
