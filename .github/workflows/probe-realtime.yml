name: probe-realtime

# בדיקת-מידע: מאשר שנתוני האיחורים של rail.co.il נמצאים ב-etaDiffTimes באותו
# endpoint שכבר השתמשנו בו, ובודק נגישות + מקור-גיבוי (MOT GTFS-RT). דוחף ל-probe-realtime-out.

on:
  push:
    paths:
      - '.github/workflows/probe-realtime.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: probe-realtime
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install GTFS-RT parser
        run: pip install --quiet gtfs-realtime-bindings protobuf
      - name: Probe rail.co.il real-time + MOT GTFS-RT
        run: |
          set +e
          python3 - <<'PY'
          import json, urllib.request, urllib.error, datetime
          out=[]
          def log(s): print(s); out.append(str(s))
          KEY="5e64d66cf03f4547bcac5de2de06b566"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          today=datetime.date.today().isoformat()
          body={"fromStation":"3700","toStation":"4600","date":today,"hour":"08:00",
                "scheduleType":"ByDeparture","systemType":"2","languageId":"English"}
          def call(url, method="POST"):
              try:
                  if method=="POST":
                      req=urllib.request.Request(url, data=json.dumps(body).encode(), headers={
                          "content-type":"application/json","ocp-apim-subscription-key":KEY,
                          "origin":"https://www.rail.co.il","referer":"https://www.rail.co.il/",
                          "user-agent":UA,"accept":"application/json","accept-language":"he,en"})
                  else:
                      req=urllib.request.Request(url, headers={"ocp-apim-subscription-key":KEY,"user-agent":UA,
                          "origin":"https://www.rail.co.il","referer":"https://www.rail.co.il/"})
                  with urllib.request.urlopen(req,timeout=40) as r:
                      return r.status, r.read().decode("utf-8","replace")
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode("utf-8","replace")
              except Exception as e:
                  return None, repr(e)

          log("================ rail.co.il (Israel Railways own API) ================")
          for url,m in [
              ("https://rail-api.rail.co.il/rjpa/api/v1/timetable/searchTrainForMobile","POST"),
              ("https://rail-api.rail.co.il/rjpa/api/v1/timetable/searchTrain","POST"),
              ("https://israelrail.azurefd.net/rjpa-prod/api/v1/timetable/searchTrainForMobile","POST"),
          ]:
              st,bd=call(url,m)
              log("%s %s -> status=%s"%(m,url,st))
              log("   has etaDiffTimes field: %s | difMin: %s"%("etaDiffTimes" in (bd or ""), "difMin" in (bd or "")))
              log("   body[:300]: %s"%((bd or "")[:300].replace(chr(10)," ")))
              log("")

          log("================ MOT GTFS-Realtime (no auth fallback) ================")
          from google.transit import gtfs_realtime_pb2
          for url in ["https://gtfs.mot.gov.il/gtfsfiles/TripUpdates.pb",
                      "https://gtfs.mot.gov.il/gtfsfiles/VehiclePositions.pb"]:
              try:
                  with urllib.request.urlopen(urllib.request.Request(url,headers={"user-agent":UA}),timeout=60) as r:
                      b=r.read(); ct=r.headers.get("content-type")
                  log("GET %s -> %d bytes, content-type=%s"%(url,len(b),ct))
                  feed=gtfs_realtime_pb2.FeedMessage(); feed.ParseFromString(b)
                  log("   parsed GTFS-RT OK: %d entities"%len(feed.entity))
              except urllib.error.HTTPError as e:
                  log("GET %s -> HTTP %s"%(url,e.code))
              except Exception as e:
                  log("GET %s -> %r"%(url,e))

          open("probe-report.txt","w").write("\n".join(out))
          PY
          ls -la probe-report.txt 2>/dev/null || true
      - name: Push results
        run: |
          set -euo pipefail
          cp probe-report.txt /tmp/r.txt 2>/dev/null || echo "no report">/tmp/r.txt
          git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan probe-out5; git reset
          find . -maxdepth 1 -mindepth 1 -not -name '.git' -exec rm -rf {} +
          cp /tmp/r.txt probe-report.txt
          git add -A; git commit -m "rail.co.il etaDiffTimes + MOT GTFS-RT probe"
          git push -f origin probe-out5:probe-realtime-out
