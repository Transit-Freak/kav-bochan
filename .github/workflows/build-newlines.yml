name: build-newlines

# בונה את שכבת "תכנון קווים חדשים" למתכנן הרפורמה (חודשי):
#  1. מושך קואורדינטות תחנות מ-GTFS (stop_code -> lat/lon).
#  2. לכל עיר: מאתר חורי-כיסוי פנימיים (נקודה 350-1100 מ׳ מתחנה אך מוקפת ב>=8 תחנות ברדיוס
#     1.2 ק"מ) ומסדרונות מועמדים לקו חדש -> ה-hub הקרוב. גאומטריה בלבד, בלי ביקוש מוצא-יעד.
#  3. אוכלוסיית למ"ס נמשכת best-effort כשכבת-העשרה (כרגע הקובץ מוגש כדף HTML — ממתין).
# מקבע את planner/planner-newlines.json ל-main (אם השתנה) + דוח אבחון לענף newlines-out.

on:
  schedule:
    - cron: '0 3 5 * *'   # ה-5 בכל חודש 03:00 UTC — רענון שכבת הכיסוי/קווים חדשים
  push:
    paths:
      - '.github/workflows/build-newlines.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-newlines
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install geo libs
        run: pip install --quiet pyshp pyproj py7zr osmium scipy shapely

      - name: Fetch GTFS stop coordinates
        run: |
          set -euo pipefail
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          URL="https://gtfs.mot.gov.il/gtfsfiles/israel-public-transportation.zip"
          # the MOT host is flaky; retry the whole download up to 5 times before giving up
          ok=
          for n in 1 2 3 4 5; do
            echo "GTFS download attempt $n…"
            if curl -fSL --connect-timeout 30 --max-time 1200 --retry 4 --retry-delay 8 --retry-all-errors -A "$UA" -o gtfs.zip "$URL" \
               && unzip -t gtfs.zip stops.txt >/dev/null 2>&1; then ok=1; break; fi
            echo "attempt $n failed; backing off"; sleep $((n*15))
          done
          [ -n "$ok" ] || { echo "GTFS unreachable after retries"; exit 1; }
          unzip -o gtfs.zip stops.txt
          wc -l stops.txt

      - name: Download OSM extract + build OSRM (car) for corridor routing & building snap
        id: osrm
        run: |
          set +e
          echo "osrm=0" >> "$GITHUB_OUTPUT"
          curl -fSL --connect-timeout 30 --max-time 1200 --retry 4 --retry-delay 8 --retry-all-errors \
            -o region.osm.pbf https://download.geofabrik.de/asia/israel-and-palestine-latest.osm.pbf
          [ -s region.osm.pbf ] || { echo "pbf download failed — corridors will fall back to straight lines"; exit 0; }
          ls -la region.osm.pbf
          IMG=ghcr.io/project-osrm/osrm-backend
          docker run --rm -v "$PWD:/data" $IMG osrm-extract -p /opt/car.lua /data/region.osm.pbf || { echo "extract failed"; exit 0; }
          docker run --rm -v "$PWD:/data" $IMG osrm-partition /data/region.osrm || exit 0
          docker run --rm -v "$PWD:/data" $IMG osrm-customize /data/region.osrm || exit 0
          docker run -d --name osrm -p 5000:5000 -v "$PWD:/data" $IMG \
            osrm-routed --algorithm mld --max-table-size 8000 /data/region.osrm
          up=
          for i in $(seq 1 40); do
            if curl -fs "http://localhost:5000/route/v1/driving/34.78,32.07;34.79,32.08?overview=false" >/dev/null; then up=1; break; fi
            sleep 2
          done
          if [ -n "$up" ]; then echo "OSRM car ready"; sed -i 's/^osrm=0/osrm=1/' "$GITHUB_OUTPUT"; else echo "OSRM did not come up"; fi

      - name: Discover + compute new-line layer
        env:
          OSRM_UP: ${{ steps.osrm.outputs.osrm }}
        run: |
          set +e
          python3 - <<'PY'
          import json, csv, io, os, zipfile, urllib.request, urllib.parse, math, struct
          out=[]
          def log(s): print(s); out.append(str(s))
          UA="Mozilla/5.0"
          def get(url, timeout=120):
              req=urllib.request.Request(url, headers={"user-agent":UA,"accept":"*/*"})
              return urllib.request.urlopen(req, timeout=timeout)

          # ---------- 1. GTFS stop coords (stop_code -> lat/lon) ----------
          coord={}
          rows=list(csv.reader(open("stops.txt", encoding="utf-8-sig")))
          h={c:i for i,c in enumerate(rows[0])}
          sc,la,lo=h["stop_code"],h["stop_lat"],h["stop_lon"]
          for r in rows[1:]:
              try: coord[r[sc].strip()]=(float(r[la]),float(r[lo]))
              except: pass
          log("GTFS stop coords: %d"%len(coord))

          # ---------- 2. data-stops -> linesPerStop + city (hubs) ----------
          ds=json.load(open("data-stops.json"))
          from collections import defaultdict
          lines_per=defaultdict(set); city_of={}
          for makat,sid,city,name in ds:
              lines_per[sid].add(makat); city_of[sid]=city
          stops=[]
          for sid,mks in lines_per.items():
              if sid in coord:
                  lat,lon=coord[sid]; stops.append((sid,lat,lon,len(mks),city_of.get(sid,"")))
          log("stops with coords + line counts: %d"%len(stops))
          lp_sorted=sorted((s[3] for s in stops))
          med_lp=lp_sorted[len(lp_sorted)//2] if lp_sorted else 0
          hub_cut=lp_sorted[int(len(lp_sorted)*0.99)] if lp_sorted else 0
          hubs=[s for s in stops if s[3]>=max(hub_cut,20)]
          hubs.sort(key=lambda s:-s[3])
          log("median linesPerStop=%d ; hub cutoff(>=p99 & >=20)=%d ; hubs=%d"%(med_lp,max(hub_cut,20),len(hubs)))
          log("top hubs: %s"%[(s[0],s[3],s[4]) for s in hubs[:6]])

          # spatial grid over stops for fast nearest-stop queries (~0.01deg ~ 1.1km cells)
          CELL=0.01
          grid=defaultdict(list)
          for sid,lat,lon,n,c in stops:
              grid[(round(lat/CELL),round(lon/CELL))].append((lat,lon))
          def hav(a,b,c,d):
              R=6371000; p=math.pi/180
              dla=(c-a)*p; dlo=(d-b)*p
              x=math.sin(dla/2)**2+math.cos(a*p)*math.cos(c*p)*math.sin(dlo/2)**2
              return 2*R*math.asin(min(1,math.sqrt(x)))
          def probe(lat,lon,R=1200):
              # nearest-stop distance AND how many stops sit within R (urban-fabric density)
              gi,gj=round(lat/CELL),round(lon/CELL); best=1e12; cnt=0
              for di in range(-2,3):
                  for dj in range(-2,3):
                      for (sla,slo) in grid.get((gi+di,gj+dj),()):
                          d=hav(lat,lon,sla,slo)
                          if d<best: best=d
                          if d<=R: cnt+=1
              return best,cnt
          def nearest_stop(lat,lon): return probe(lat,lon)[0]
          def nearest_hub(lat,lon):
              best=None; bd=1e12
              for sid,hla,hlo,n,c in hubs:
                  d=hav(lat,lon,hla,hlo)
                  if d<bd: bd=d; best=(sid,hla,hlo,n,c,d)
              return best

          # ---------- 2b. OSM geometry: drop NON-residential zones; snap to homes ----------
          # OSM landuse=residential is too sparse in Israel to require (only ~4k polygons), so instead
          # we EXCLUDE the zones OSM *does* tag reliably — industry/commerce/retail/parks/forest/farm/
          # parking/institutions — and let the building-snap (drop if no building within 200m) handle
          # roads/open land. Net: candidates stay in built-up residential fabric. Best-effort.
          EXC_LU={"industrial","commercial","retail","farmland","farmyard","orchard","vineyard","forest",
                  "meadow","grass","cemetery","quarry","landfill","military","railway","construction",
                  "brownfield","greenfield","recreation_ground","plant_nursery","allotments","depot"}
          EXC_LEIS={"park","garden","pitch","golf_course","sports_centre","stadium","nature_reserve","playground","track"}
          EXC_NAT={"wood","scrub","water","wetland","beach","sand","bare_rock","grassland","heath"}
          EXC_AMEN={"parking","school","university","college","hospital","grave_yard"}
          tree=None; B_lat=B_lon=None; exc_tree=None; exc_polys=None; cosf=math.cos(31.5*math.pi/180)
          try:
              if os.path.exists("region.osm.pbf"):
                  import osmium, numpy as np
                  from scipy.spatial import cKDTree
                  from shapely.geometry import Polygon, Point
                  from shapely.strtree import STRtree
                  class OH(osmium.SimpleHandler):
                      def __init__(s): osmium.SimpleHandler.__init__(s); s.bla=[]; s.blo=[]; s.polys=[]
                      def way(s,w):
                          t=w.tags
                          if 'building' in t:
                              xs=[]; ys=[]
                              for n in w.nodes:
                                  if n.location.valid(): xs.append(n.location.lat); ys.append(n.location.lon)
                              if xs: s.bla.append(sum(xs)/len(xs)); s.blo.append(sum(ys)/len(ys))
                          exc=(t.get('landuse') in EXC_LU or t.get('leisure') in EXC_LEIS
                               or t.get('natural') in EXC_NAT or t.get('amenity') in EXC_AMEN)
                          if exc and w.is_closed():
                              pp=[(n.location.lon,n.location.lat) for n in w.nodes if n.location.valid()]
                              if len(pp)>=4:
                                  try: s.polys.append(Polygon(pp))
                                  except Exception: pass
                  oh=OH(); oh.apply_file("region.osm.pbf", locations=True)
                  if oh.bla:
                      B_lat=np.array(oh.bla); B_lon=np.array(oh.blo)
                      tree=cKDTree(np.column_stack([B_lat, B_lon*cosf]))
                  exc_polys=oh.polys
                  if exc_polys: exc_tree=STRtree(exc_polys)
                  log("buildings indexed: %d ; non-residential exclude polygons: %d"%(len(oh.bla),len(exc_polys)))
          except Exception as e:
              import traceback; log("OSM index failed (filter off): %r"%e); log(traceback.format_exc()[:400])

          def is_residential(lat,lon):
              # residential := built-up (snap handles that) AND not inside an excluded non-residential zone
              if exc_tree is None: return True
              from shapely.geometry import Point
              p=Point(lon,lat)
              try: cand=exc_tree.query(p)
              except Exception: return True
              for x in cand:
                  poly = x if hasattr(x,"contains") else exc_polys[int(x)]
                  if poly.contains(p): return False
              return True
          def snap(lat,lon,maxm=200):
              if tree is None: return None
              d,i=tree.query([lat,lon*cosf]); dm=d*111320
              return (round(float(B_lat[i]),5),round(float(B_lon[i]),5)) if dm<=maxm else None

          # ---------- 3. per-city coverage gaps + candidate corridor stubs ----------
          # PRIMARY (reliable, geometry only): for each city, find spots INSIDE the urban
          # stop-cloud that are far from any stop (a local coverage gap, not empty desert),
          # cluster them, and draw a candidate corridor to the nearest hub. No population
          # needed — labelled a draft; population (below) only enriches if it loads.
          from math import cos, pi
          city_stops=defaultdict(list)
          for sid,lat,lon,n,c in stops:
              city_stops[c].append((lat,lon,n))
          GAP_MIN, GAP_MAX = 400, 1100   # 400m = official MOT walking-distance-to-stop standard (2016 guidelines); 1100 upper bound excludes desert
          cities_out={}
          tot_gaps=tot_stubs=0
          for c, pts in city_stops.items():
              if len(pts) < 12: continue
              lats=sorted(p[0] for p in pts); lons=sorted(p[1] for p in pts)
              # clamp bbox to the 2-98 percentile so a single outlier stop can't blow up the grid
              def pc(a,f): return a[min(len(a)-1,max(0,int(len(a)*f)))]
              la0,la1,lo0,lo1=pc(lats,.02),pc(lats,.98),pc(lons,.02),pc(lons,.98)
              clat=(la0+la1)/2; STEP=0.0035  # ~390m
              stepLon=STEP/max(0.3,cos(clat*pi/180))
              # coarsen if the grid would exceed ~12k cells
              ncell=((la1-la0)/STEP+1)*((lo1-lo0)/stepLon+1)
              if ncell>12000:
                  f=(ncell/12000)**0.5; STEP*=f; stepLon*=f
              gaps=[]
              la=la0
              while la<=la1:
                  lo=lo0
                  while lo<=lo1:
                      d,dens=probe(la,lo)
                      # interior urban hole: far from the nearest stop, embedded in the stop cloud
                      # (>=8 stops within 1.2km), and NOT inside a non-residential zone (industry/
                      # commerce/park/forest/farm/parking/institution). Snap below drops open-land/roads.
                      if GAP_MIN<d<GAP_MAX and dens>=8 and is_residential(la,lo):
                          gaps.append((round(la,5),round(lo,5),round(d)))
                      lo+=stepLon
                  la+=STEP
              if not gaps: continue
              # cluster gap cells (snap to ~700m grid) -> corridor candidates to nearest hub
              clusters=defaultdict(list)
              for gl,go,gd in gaps:
                  clusters[(round(gl/0.006),round(go/0.006))].append((gl,go,gd))
              stubs=[]
              for cl in clusters.values():
                  if len(cl)<2: continue
                  ml=sum(x[0] for x in cl)/len(cl); mo=sum(x[1] for x in cl)/len(cl)
                  nh=nearest_hub(ml,mo)
                  if not nh: continue
                  # "homes served" proxy: residential buildings within ~400m walk of the gap
                  homes=None
                  if tree is not None:
                      homes=int(len(tree.query_ball_point([ml, mo*cosf], 400.0/111320.0)))
                  stubs.append({"lat":round(ml,5),"lon":round(mo,5),"cells":len(cl),
                                "maxM":max(x[2] for x in cl),"homes":homes,"hubSid":nh[0],
                                "hubLat":round(nh[1],5),"hubLon":round(nh[2],5),
                                "hubLines":nh[3],"hubCity":nh[4],"km":round(nh[5]/1000,1)})
              # rank by homes served (fall back to gap size where buildings weren't indexed)
              stubs.sort(key=lambda s:-((s["homes"] if s["homes"] is not None else s["cells"]*s["maxM"])))
              gaps.sort(key=lambda g:-g[2])
              cities_out[c]={"gaps":[{"lat":g[0],"lon":g[1],"m":g[2]} for g in gaps[:60]],
                             "stubs":stubs[:12], "maxGapM":max(g[2] for g in gaps),
                             "stopCount":len(pts)}
              tot_gaps+=len(gaps); tot_stubs+=len(stubs)
          log("\ncoverage: %d cities analysed ; %d gap cells ; %d candidate corridors"%(
              len(cities_out), tot_gaps, tot_stubs))
          top=sorted(cities_out.items(), key=lambda kv:-len(kv[1]["stubs"]))[:6]
          log("top cities by corridors: %s"%[(c,len(v["stubs"]),v["maxGapM"]) for c,v in top])

          # ---------- 3b. snap points onto homes + route corridors along roads ----------
          # Points are snapped to the nearest OSM building (they already passed the residential gate);
          # corridors are routed origin->hub on the road network via OSRM (car). Best-effort.
          OSRM_UP = os.environ.get("OSRM_UP")=="1"
          def route(la1,lo1,la2,lo2):
              if not OSRM_UP: return None
              try:
                  u=("http://localhost:5000/route/v1/driving/%f,%f;%f,%f?overview=full&geometries=geojson"%(lo1,la1,lo2,la2))
                  j=json.load(urllib.request.urlopen(u,timeout=12))
                  if j.get("code")=="Ok" and j.get("routes"):
                      co=j["routes"][0]["geometry"]["coordinates"]
                      st=max(1,len(co)//40)
                      path=[[round(c[1],5),round(c[0],5)] for c in co[::st]]
                      last=[round(co[-1][1],5),round(co[-1][0],5)]
                      if path[-1]!=last: path.append(last)
                      return {"path":path,"km":round(j["routes"][0]["distance"]/1000,1)}
              except Exception: return None
              return None

          snapped=dropped=routed=0
          for c,v in cities_out.items():
              ng=[]
              for g in v["gaps"]:
                  if tree is not None:
                      s=snap(g["lat"],g["lon"],200)
                      if s is None: dropped+=1; continue
                      g={"lat":s[0],"lon":s[1],"m":g["m"]}; snapped+=1
                  ng.append(g)
              v["gaps"]=ng
              kept=[]
              for s in v["stubs"]:
                  if tree is not None:
                      sn=snap(s["lat"],s["lon"],350)
                      if sn: s["lat"],s["lon"]=sn[0],sn[1]
                  r=route(s["lat"],s["lon"],s["hubLat"],s["hubLon"])
                  if r: s["path"]=r["path"]; s["roadKm"]=r["km"]; routed+=1
                  kept.append(s)
              v["stubs"]=kept
              if v["gaps"]: v["maxGapM"]=max(g["m"] for g in v["gaps"])
          log("snap: %d gaps on buildings, %d dropped (no building<200m); corridors routed on road: %d"%(snapped,dropped,routed))

          # ---------- 4. CBS population (best-effort enrichment; never blocks) ----------
          log("\n==== best-effort CBS population (enrichment only) ====")
          import re
          hasPop=False; pop_total=0
          def fetch_bytes(url, ref="https://data.gov.il/"):
              req=urllib.request.Request(url, headers={"user-agent":
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "accept":"*/*","referer":ref})
              return urllib.request.urlopen(req, timeout=120).read()
          cand_urls=[]
          try:
              j=json.load(get("https://data.gov.il/api/3/action/package_show?id=statistical-area-2008"))
              for rr in j["result"]["resources"]:
                  if rr.get("url"): cand_urls.append(rr["url"])
          except Exception as e:
              log("package_show failed: %r"%e)
          archive=None
          for u in list(cand_urls)+[u.replace("e.data.gov.il","data.gov.il") for u in cand_urls]:
              try:
                  b=fetch_bytes(u); log("  try %s -> %d bytes magic=%r"%(u[:70],len(b),b[:6]))
                  if b[:2]==b"PK" or b[:2]==b"7z" or b[:6]==b"\x37\x7a\xbc\xaf\x27\x1c":
                      archive=b; break
                  if b[:6].lower()==b"<!doct" or b[:5].lower()==b"<html":
                      # scan the portal page for a real archive link
                      m=re.findall(r'href=["\\\']([^"\\\']+\.(?:7z|zip))["\\\']', b.decode("utf-8","ignore"), re.I)
                      for link in m[:4]:
                          lu=link if link.startswith("http") else urllib.parse.urljoin(u, link)
                          try:
                              bb=fetch_bytes(lu); log("    link %s -> %d magic=%r"%(lu[:70],len(bb),bb[:6]))
                              if bb[:2]in(b"PK",b"7z") or bb[:6]==b"\x37\x7a\xbc\xaf\x27\x1c": archive=bb; break
                          except Exception as e: log("    link fail %r"%e)
                  if archive: break
              except Exception as e:
                  log("  fetch fail %r"%e)
          if archive:
              try:
                  tmp="/tmp/sa"; os.makedirs(tmp,exist_ok=True)
                  if archive[:2]==b"PK": zipfile.ZipFile(io.BytesIO(archive)).extractall(tmp)
                  else:
                      import py7zr
                      with py7zr.SevenZipFile(io.BytesIO(archive)) as z: z.extractall(path=tmp)
                  shp=None
                  for root,_,files in os.walk(tmp):
                      for fn in files:
                          if fn.lower().endswith(".shp"): shp=os.path.join(root,fn)
                  log("CBS shapefile extracted: %s"%shp)
                  if shp:
                      import shapefile
                      from pyproj import Transformer
                      sf=shapefile.Reader(shp[:-4]); flds=[f[0] for f in sf.fields[1:]]
                      log("DBF fields: %s"%flds)
                      tf=Transformer.from_crs("EPSG:2039","EPSG:4326",always_xy=True)
                      popf=next((f for f in flds if f.upper() in ("POP_TOTAL","POP","POPULATION","TOSHAVIM","SUM_POP","T_POP","SUM_2008")),None)
                      log("pop field: %s ; sample: %s"%(popf, sf.record(0).as_dict() if sf.numRecords else {}))
                      cents=[]
                      for sr in sf.iterShapeRecords():
                          pp=sr.shape.points
                          if not pp: continue
                          cx=sum(p[0] for p in pp)/len(pp); cy=sum(p[1] for p in pp)/len(pp)
                          lon,lat=tf.transform(cx,cy)
                          if not (29<lat<34 and 34<lon<36): continue
                          pv=0
                          if popf:
                              try: pv=int(float(sr.record.as_dict().get(popf) or 0))
                              except: pv=0
                          cents.append((round(lat,5),round(lon,5),pv))
                      pop_total=sum(c[2] for c in cents)
                      hasPop = pop_total>0
                      log("CBS centroids: %d ; total pop: %s"%(len(cents), f"{pop_total:,}"))
                      if hasPop:
                          # attach population to each city's gap centroids (nearest centroid within 600m)
                          cg=defaultdict(list)
                          for la,lo,pv in cents: cg[(round(la/0.006),round(lo/0.006))].append((la,lo,pv))
                          covered=0
                          for c,v in cities_out.items():
                              for s in v["stubs"]:
                                  best=0
                                  for di in(-1,0,1):
                                      for dj in(-1,0,1):
                                          for la,lo,pv in cg.get((round(s["lat"]/0.006)+di,round(s["lon"]/0.006)+dj),()):
                                              if hav(s["lat"],s["lon"],la,lo)<600 and pv>best: best=pv
                                  s["pop"]=best; covered+=best
                          log("population near candidate corridors: %s"%f"{covered:,}")
              except Exception as e:
                  import traceback; log("CBS parse failed: %r"%e); log(traceback.format_exc()[:500])
          else:
              log("CBS archive not retrievable in this run — shipping geometry-only coverage (population pending).")

          result={"generatedAt":None,"stopsWithCoords":len(stops),"hasPopulation":hasPop,
                  "popTotal":pop_total,
                  "hubs":[{"sid":s[0],"lat":round(s[1],5),"lon":round(s[2],5),"lines":s[3],"city":s[4]} for s in hubs[:200]],
                  "cities":cities_out,
                  "notes":"draft — local coverage gaps are geometry-only (no origin-destination demand). A gap may be a park/industrial zone. Corridors are drafts for a human planner."}
          json.dump(result, open("planner-newlines.json","w"), ensure_ascii=False, separators=(",",":"))
          log("\nwrote planner-newlines.json (%.0f KB)"%(os.path.getsize('planner-newlines.json')/1024))
          open("newlines-report.txt","w",encoding="utf-8").write("\n".join(out))
          PY
          ls -la planner-newlines.json newlines-report.txt 2>/dev/null || true

      - name: Commit fresh layer to main + debug report to branch
        run: |
          set -euo pipefail
          cp newlines-report.txt /tmp/r.txt 2>/dev/null || echo "no report">/tmp/r.txt
          cp planner-newlines.json /tmp/n.json 2>/dev/null || echo '{}'>/tmp/n.json
          git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 1) commit the refreshed layer into planner/ on main (only if it changed)
          git fetch origin main; git checkout main; git reset --hard origin/main
          mkdir -p planner; cp /tmp/n.json planner/planner-newlines.json
          if ! git diff --quiet -- planner/planner-newlines.json; then
            git add planner/planner-newlines.json
            git commit -m "data: refresh new-line coverage layer (planner-newlines.json)"
            for n in 1 2 3 4; do git push origin main && break || sleep $((n*2)); done
          else
            echo "no change in planner-newlines.json — skipping commit"
          fi
          # 2) keep the discovery report on a debug branch
          git checkout --orphan nl-out; git reset
          find . -maxdepth 1 -mindepth 1 -not -name '.git' -exec rm -rf {} +
          cp /tmp/r.txt newlines-report.txt; cp /tmp/n.json planner-newlines.json
          git add -A; git commit -m "new-line layer debug report"
          git push -f origin nl-out:newlines-out
