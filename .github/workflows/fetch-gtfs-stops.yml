name: fetch-gtfs-stops

on:
  push:
    paths:
      - '.github/workflows/fetch-gtfs-stops.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-gtfs
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GTFS, extract stops.txt, push to gtfs-data branch
        run: |
          set -euo pipefail
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          URL="https://gtfs.mot.gov.il/gtfsfiles/israel-public-transportation.zip"
          echo "== Download (timeouts on) =="
          curl -fSL --connect-timeout 30 --max-time 900 --retry 2 --retry-delay 10 -A "$UA" -o gtfs.zip "$URL"
          ls -la gtfs.zip
          echo "== Extract stops.txt =="
          unzip -o gtfs.zip stops.txt
          ls -la stops.txt
          echo "lines:"; wc -l stops.txt
          echo "head:"; head -3 stops.txt
          cp stops.txt /tmp/stops.txt
          echo "== Push stops.txt to gtfs-data branch =="
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gtfs-data
          git reset
          find . -maxdepth 1 -mindepth 1 -not -name '.git' -not -name 'stops.txt' -exec rm -rf {} +
          cp /tmp/stops.txt ./stops.txt
          git add -A
          git commit -m "GTFS stops.txt from MOT"
          git push -f origin gtfs-data
