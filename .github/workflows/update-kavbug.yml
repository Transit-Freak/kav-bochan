name: update-kavbug

# שבועי: רענון הדוחות הארציים של "קו באג" מ-GTFS של משרד התחבורה.
#   • country-scan.json/csv — כל העיקופים/הפערים בקווי האוטובוס בארץ
#     (kavbug/scan-country.js, אותו מנוע-זיהוי כמו האתר).
#   • rail-gaps.json/csv — פערים בין לוח-הזמנים לרכבות לבין ה-API החי של רכבת ישראל
#     (kavbug/rail-gaps.js — מיטבי; אם ה-API לא זמין הצעד מדלג והסריקה הארצית עדיין נשמרת).
# רץ יום ראשון 04:00 UTC — שעתיים אחרי update-weekly, כדי לא להעמיס על שרת ה-GTFS בו-זמנית.

on:
  schedule:
    - cron: '0 4 * * 0'   # כל יום ראשון 04:00 UTC
  push:
    paths:
      - '.github/workflows/update-kavbug.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-kavbug
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch fresh national GTFS
        run: |
          set -euo pipefail
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          URL="https://gtfs.mot.gov.il/gtfsfiles/israel-public-transportation.zip"
          curl -fSL --connect-timeout 20 --max-time 1200 --retry 6 --retry-all-errors --retry-delay 15 -A "$UA" -o gtfs.zip "$URL"
          ls -la gtfs.zip

      - name: Install fflate (ZIP reader)
        run: npm install fflate --no-save

      - name: Scan country — bus-route detours & gaps
        run: |
          set -euo pipefail
          node --max-old-space-size=4096 kavbug/scan-country.js gtfs.zip kavbug/country-scan
          ls -la kavbug/country-scan.json kavbug/country-scan.csv

      - name: Rail gaps — schedule vs live rail API (best-effort)
        continue-on-error: true
        run: |
          set -uo pipefail
          node kavbug/rail-gaps.js gtfs.zip kavbug/rail-gaps || echo "rail-gaps.js failed (non-fatal)"
          # אם הסריקה יצאה ריקה (0 רכבות — בד"כ data.gov.il/API של רכבת ישראל לא זמין),
          # משחזרים את הדוח הקודם הטוב במקום לדרוס אותו בדוח ריק.
          TC=$(python3 -c "import json;print(json.load(open('kavbug/rail-gaps.json')).get('trainsChecked',0))" 2>/dev/null || echo 0)
          echo "rail trainsChecked=$TC"
          if [ "${TC:-0}" -lt 1 ]; then
            echo "rail scan empty — keeping previous rail-gaps report"
            git checkout -- kavbug/rail-gaps.json kavbug/rail-gaps.csv || true
          fi
          ls -la kavbug/rail-gaps.json kavbug/rail-gaps.csv

      - name: Commit refreshed KavBug reports to main
        run: |
          set -euo pipefail
          rm -rf gtfs.zip node_modules package-lock.json package.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kavbug/country-scan.json kavbug/country-scan.csv kavbug/rail-gaps.json kavbug/rail-gaps.csv
          if git diff --cached --quiet; then
            echo "KavBug reports unchanged — nothing to commit"; exit 0; fi
          git commit -m "weekly: refresh KavBug country scan & rail gaps from GTFS"
          git push origin HEAD:main

# retry: MOT recovered ~08:10Z — re-run KavBug country scan & rail gaps
