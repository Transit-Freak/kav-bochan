name: fetch-osm-poi

on:
  push:
    paths:
      - '.github/workflows/fetch-osm-poi.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-osm-poi
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Query Overpass for Israel POIs
        run: |
          set -euo pipefail
          Q='[out:json][timeout:700];area["ISO3166-1"="IL"][admin_level=2]->.il;(nwr["amenity"~"^(school|university|college|kindergarten|hospital|clinic|townhall|police|fire_station|library|community_centre|courthouse|theatre|cinema|bus_station|marketplace|fuel|bank|place_of_worship|post_office|grave_yard)$"]["name"](area.il);nwr["landuse"="cemetery"]["name"](area.il);nwr["shop"~"^(mall|department_store|supermarket|convenience)$"]["name"](area.il);nwr["railway"="station"]["name"](area.il);nwr["leisure"~"^(park|sports_centre|stadium|pitch)$"]["name"](area.il);nwr["tourism"~"^(museum|attraction)$"]["name"](area.il);nwr["office"="government"]["name"](area.il);nwr["public_transport"="station"]["name"](area.il);nwr["highway"="motorway_junction"]["name"](area.il);nwr["junction"="yes"]["name"](area.il););out center tags;'
          ok=0
          for ep in https://overpass-api.de/api/interpreter https://overpass.kumi.systems/api/interpreter https://maps.mail.ru/osm/tools/overpass/api/interpreter; do
            echo "== trying $ep =="
            if curl -fsS --max-time 800 --data-urlencode "data=$Q" "$ep" -o raw.json; then ok=1; echo "got $(wc -c < raw.json) bytes"; break; fi
            echo "failed, next endpoint"; sleep 5
          done
          [ "$ok" = "1" ] || { echo "all overpass endpoints failed"; exit 1; }

      - name: Process to compact poi.json
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          d=json.load(open('raw.json'))
          def cat(t):
            sh=t.get('shop'); am=t.get('amenity'); rw=t.get('railway')
            le=t.get('leisure'); to=t.get('tourism'); of=t.get('office'); pt=t.get('public_transport')
            hw=t.get('highway'); jn=t.get('junction')
            if hw=='motorway_junction' or jn=='yes': return 'junction'
            if sh in ('mall','department_store'): return 'mall'
            if sh in ('supermarket','convenience'): return 'shop'
            if am=='fuel': return 'fuel'
            if am=='bank': return 'bank'
            if am=='post_office': return 'post'
            if am=='grave_yard' or t.get('landuse')=='cemetery': return 'cemetery'
            if rw=='station': return 'train'
            if am=='place_of_worship': return 'worship'
            if am in ('school','kindergarten'): return 'school'
            if am in ('university','college'): return 'academia'
            if am in ('hospital','clinic'): return 'health'
            if am=='police': return 'police'
            if am=='fire_station': return 'fire'
            if am=='library': return 'library'
            if am=='community_centre': return 'community'
            if am in ('townhall','courthouse') or of=='government': return 'gov'
            if am in ('theatre','cinema') or to in ('museum','attraction'): return 'culture'
            if am=='bus_station' or pt=='station': return 'busstation'
            if am=='marketplace': return 'mall'
            if le=='park': return 'park'
            if le in ('sports_centre','stadium','pitch'): return 'sport'
            return 'other'
          out=[]
          for e in d.get('elements',[]):
            t=e.get('tags',{}); name=t.get('name')
            if not name: continue
            lat=e.get('lat'); lon=e.get('lon')
            if lat is None:
              c=e.get('center') or {}; lat=c.get('lat'); lon=c.get('lon')
            if lat is None or lon is None: continue
            out.append({'n':name,'la':round(float(lat),5),'lo':round(float(lon),5),'k':cat(t)})
          json.dump({'count':len(out),'poi':out}, open('poi.json','w'), ensure_ascii=False, separators=(',',':'))
          print('POIs:', len(out))
          PY
          ls -la poi.json

      - name: Push poi.json to osm-poi branch
        run: |
          set -euo pipefail
          cp poi.json /tmp/poi.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan osm-poi
          git reset
          find . -maxdepth 1 -mindepth 1 -not -name '.git' -not -name 'poi.json' -exec rm -rf {} +
          cp /tmp/poi.json ./poi.json
          git add -A
          git commit -m "OSM POI for Israel (broad)"
          git push -f origin osm-poi
