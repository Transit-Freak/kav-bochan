<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>בדיקת זמן-אמת · רכבות</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Assistant", system-ui, Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
  header { padding: 14px 16px; background: #1e293b; border-bottom: 1px solid #334155; }
  h1 { margin: 0; font-size: 19px; }
  .sub { color: #94a3b8; font-size: 13px; margin-top: 2px; }
  .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 12px 16px; background: #111827; border-bottom: 1px solid #334155; }
  button { background: #2563eb; color: #fff; border: 0; border-radius: 9px; padding: 9px 16px; font: inherit; font-weight: 700; cursor: pointer; }
  button:disabled { opacity: .5; }
  .fresh { font-weight: 800; }
  .fresh.live { color: #4ade80; } .fresh.stale { color: #f87171; } .fresh.warn { color: #fbbf24; }
  #map { height: 42vh; min-height: 260px; }
  .err { background: #7f1d1d; color: #fff; padding: 12px 16px; font-weight: 700; white-space: pre-wrap; }
  .list { padding: 8px 12px 40px; }
  .row { background: #1e293b; border: 1px solid #334155; border-radius: 11px; padding: 10px 12px; margin: 8px 0; font-size: 13px; }
  .row b { color: #fff; }
  .k { color: #94a3b8; }
  .pill { display: inline-block; background: #334155; border-radius: 6px; padding: 1px 7px; font-size: 12px; font-weight: 700; }
  .muted { color: #64748b; font-size: 12px; }
  a { color: #60a5fa; }
</style>
</head>
<body>
<header>
  <h1>🚆 בדיקת זמן-אמת · רכבות</h1>
  <div class="sub">מושך נתוני רכבת חיים ישירות מ-Open Bus (SIRI של משרד התחבורה, operator 2) — מהדפדפן שלך.</div>
</header>
<div class="bar">
  <button id="refresh">רענן עכשיו</button>
  <span id="status" class="muted">טוען…</span>
  <span id="freshness"></span>
</div>
<div id="err" class="err" style="display:none"></div>
<div id="map"></div>
<div class="list" id="list"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = "https://open-bus-stride-api.hasadna.org.il";
const $ = (id) => document.getElementById(id);
let map, layer;

function initMap() {
  map = L.map("map", { center: [32.0, 34.9], zoom: 8 });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "© OpenStreetMap", maxZoom: 18 }).addTo(map);
  layer = L.layerGroup().addTo(map);
}

function ago(iso) {
  const t = new Date(iso).getTime();
  const min = Math.round((Date.now() - t) / 60000);
  if (min < 60) return min + " דק׳";
  const h = Math.round(min / 60);
  if (h < 48) return h + " שע׳";
  return Math.round(h / 24) + " ימים";
}

async function load() {
  $("refresh").disabled = true;
  $("status").textContent = "טוען נתונים…";
  $("err").style.display = "none";
  try {
    const from = new Date(Date.now() - 2 * 3600 * 1000).toISOString().slice(0, 19) + "Z";
    const qs = new URLSearchParams({
      siri_routes__operator_refs: "2",
      recorded_at_time_from: from,
      limit: "800",
      order_by: "recorded_at_time desc",
    });
    const url = API + "/siri_vehicle_locations/list?" + qs.toString();
    const r = await fetch(url, { headers: { accept: "application/json" } });
    if (!r.ok) throw new Error("HTTP " + r.status + " מהשרת");
    const data = await r.json();

    // latest location per ride
    const rides = {};
    for (const v of data) {
      const id = v.siri_ride__id;
      if (!rides[id] || (v.recorded_at_time || "") > (rides[id].recorded_at_time || "")) rides[id] = v;
    }
    const list = Object.values(rides).sort((a, b) => (b.recorded_at_time || "").localeCompare(a.recorded_at_time || ""));

    // freshness banner
    const newest = list.length ? list[0].recorded_at_time : null;
    const fr = $("freshness");
    if (newest) {
      const a = ago(newest);
      const cls = /דק׳|שע׳/.test(a) && parseInt(a) < 30 ? "live" : (a.includes("ימים") ? "stale" : "warn");
      fr.className = "fresh " + cls;
      fr.textContent = "עדכניות: המדידה האחרונה מ-" + new Date(newest).toLocaleString("he-IL") + " (לפני " + a + ")";
    } else fr.textContent = "";

    $("status").textContent = list.length + " רכבות חיות (מתוך " + data.length + " מדידות)";

    // map
    layer.clearLayers();
    const pts = [];
    for (const v of list) {
      if (v.lat == null) continue;
      pts.push([v.lat, v.lon]);
      L.circleMarker([v.lat, v.lon], { radius: 6, color: "#2563eb", fillColor: "#60a5fa", fillOpacity: .9, weight: 2 })
        .addTo(layer)
        .bindPopup(
          "<b>קו " + (v.siri_route__line_ref ?? "?") + "</b><br>" +
          "journey: " + (v.siri_ride__journey_ref ?? "?") + "<br>" +
          "יציאה מתוכננת: " + (v.siri_ride__scheduled_start_time ?? "?") + "<br>" +
          "נמדד: " + (v.recorded_at_time ?? "?") + "<br>" +
          "מהירות: " + (v.velocity ?? "?") + " קמ\"ש"
        );
    }
    if (pts.length) map.fitBounds(pts, { padding: [40, 40], maxZoom: 12 });

    // list
    $("list").innerHTML = list.slice(0, 60).map((v) =>
      '<div class="row">' +
        '<span class="pill">קו ' + (v.siri_route__line_ref ?? "?") + "</span> " +
        '<span class="k">journey:</span> <b>' + (v.siri_ride__journey_ref ?? "?") + "</b><br>" +
        '<span class="k">יציאה מתוכננת:</span> ' + (v.siri_ride__scheduled_start_time ?? "?") + " · " +
        '<span class="k">נמדד:</span> <b>' + (v.recorded_at_time ?? "?") + "</b> (לפני " + ago(v.recorded_at_time) + ")<br>" +
        '<span class="k">מיקום:</span> ' + (v.lat?.toFixed ? v.lat.toFixed(4) : v.lat) + ", " + (v.lon?.toFixed ? v.lon.toFixed(4) : v.lon) +
        " · <span class=\"k\">מהירות:</span> " + (v.velocity ?? "?") + " קמ\"ש" +
      "</div>"
    ).join("") || '<div class="muted">לא חזרו רכבות.</div>';
  } catch (e) {
    $("status").textContent = "";
    $("err").style.display = "block";
    $("err").textContent =
      "❌ הקריאה ל-Open Bus נכשלה: " + (e && e.message ? e.message : e) +
      "\n\nאם זו שגיאת CORS / Failed to fetch — המשמעות: הדפדפן חסום מלקרוא ישירות ל-API, ונצטרך proxy.\n" +
      "אם זו שגיאת רשת אחרת — אולי האתר נטען ללא אינטרנט.";
  }
  $("refresh").disabled = false;
}

initMap();
$("refresh").onclick = load;
load();
</script>
</body>
</html>
