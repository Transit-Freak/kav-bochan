<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>מתכנן הרפורמה · הקו הבוחן</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../vendor/tailwind.js"></script>
<script src="../vendor/react.development.js"></script>
<script src="../vendor/react-dom.development.js"></script>
<script src="../vendor/babel.min.js"></script>
<style>
  *{box-sizing:border-box}
  html{direction:rtl}
  body{margin:0;background:#0f172a;color:#e2e8f0;font-family:"Assistant","Heebo",system-ui,Arial,sans-serif}
  .scroll::-webkit-scrollbar{width:8px;height:8px}
  .scroll::-webkit-scrollbar-thumb{background:#334155;border-radius:8px}
  input[type=range]{accent-color:#38bdf8}
  .rt-lbl{background:transparent;border:0;box-shadow:none;color:#fff;font-weight:900;font-size:10px;text-shadow:0 0 3px #000,0 0 3px #000}
  .rt-lbl::before{display:none}
</style>
</head>
<body>
<div id="root" class="min-h-screen"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;
const BUILD = "2026-06-29c";

// ---------- helpers ----------
const nf = (n, d = 0) => n == null ? "—" : Number(n).toLocaleString("he-IL", { maximumFractionDigits: d });
const pct = (n) => (n >= 0 ? "+" : "") + n.toFixed(1) + "%";
const cls = (...a) => a.filter(Boolean).join(" ");

// overlap-coefficient from two stopId arrays
function ovc(aArr, bArr) {
  if (!aArr || !bArr || !aArr.length || !bArr.length) return 0;
  const A = new Set(aArr), B = bArr;
  let inter = 0;
  for (const x of B) if (A.has(x)) inter++;
  return inter / Math.min(aArr.length, bArr.length);
}
// greedy clique-cover on a node list with adjacency map adj[a+'|'+b]=ov, threshold tau
function cliqueCover(nodes, adj, tau) {
  const rem = new Set(nodes);
  const deg = {}, sum = {};
  for (const n of nodes) {
    let d = 0, s = 0;
    for (const m of nodes) if (m !== n) { const v = adj[n + "|" + m] || 0; if (v >= tau) d++; s += v; }
    deg[n] = d; sum[n] = s;
  }
  const out = [];
  while (rem.size) {
    let seed = null;
    for (const n of rem) if (seed === null || deg[n] > deg[seed] || (deg[n] === deg[seed] && sum[n] > sum[seed])) seed = n;
    const cl = [seed];
    const cand = [...rem].filter((m) => m !== seed && (adj[seed + "|" + m] || 0) >= tau)
      .sort((a, b) => (adj[seed + "|" + b] || 0) - (adj[seed + "|" + a] || 0));
    for (const m of cand) if (cl.every((c) => (adj[m + "|" + c] || 0) >= tau)) cl.push(m);
    for (const n of cl) rem.delete(n);
    out.push(cl);
  }
  return out;
}

const VERDICT_HE = {
  "ADD": "להגביר תדירות", "CUT": "להפחית תדירות",
  "RIGHT-SIZE-UP": "אוטובוס גדול יותר", "RIGHT-SIZE-DOWN": "אוטובוס קטן יותר", "HOLD": "ללא שינוי",
};
const VERDICT_COLOR = {
  "ADD": "#f87171", "CUT": "#60a5fa", "RIGHT-SIZE-UP": "#c084fc", "RIGHT-SIZE-DOWN": "#a78bfa", "HOLD": "#64748b",
};
// distinct colours so each candidate corridor is visually separable on the map
const ROUTE_PAL = ["#ef4444", "#f59e0b", "#22c55e", "#3b82f6", "#a855f7", "#ec4899", "#14b8a6", "#eab308", "#f97316", "#06b6d4", "#8b5cf6", "#84cc16"];

// ---------- tiny UI atoms ----------
function Stat({ label, value, color, sub }) {
  return (
    <div className="bg-slate-800/70 border border-slate-700 rounded-xl px-3 py-2">
      <div className="text-2xl font-black leading-tight" style={{ color: color || "#e2e8f0" }}>{value}</div>
      <div className="text-[11.5px] text-slate-400 font-bold">{label}</div>
      {sub && <div className="text-[10.5px] text-slate-500">{sub}</div>}
    </div>
  );
}
function Spark({ data, color = "#38bdf8" }) {
  const max = Math.max(1, ...data);
  return (
    <div className="flex items-end gap-[1px] h-7" title="פרופיל עומס לפי שעה (ימי חול)">
      {data.map((v, i) => (
        <div key={i} style={{ height: (4 + 24 * v / max) + "px", background: i >= 6 && i <= 9 || i >= 15 && i <= 18 ? color : "#475569", width: "3px", borderRadius: "1px" }} />
      ))}
    </div>
  );
}

// ---------- main app ----------
function App() {
  const [data, setData] = useState(null);
  const [err, setErr] = useState(null);
  const [city, setCity] = useState(null);
  const [tau, setTau] = useState(0.85);
  const [tab, setTab] = useState("consolidate");
  const [scenario, setScenario] = useState({}); // key -> change
  const [sortCut, setSortCut] = useState("ratio");
  const [nl, setNl] = useState(null); // new-line layer (lazy)
  const [nlErr, setNlErr] = useState(null);

  useEffect(() => {
    if (tab !== "newlines" || nl || nlErr) return;
    fetch("planner-newlines.json?v=" + BUILD).then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(setNl).catch((e) => setNlErr(String(e)));
  }, [tab, nl, nlErr]);

  useEffect(() => {
    fetch("planner-data.json?v=" + BUILD).then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then((d) => {
        setData(d);
        const cities = Object.keys(d.cities);
        cities.sort((a, b) => d.cities[b].lines.filter(x => x.cut).length - d.cities[a].lines.filter(x => x.cut).length);
        setCity(cities[0]);
      }).catch((e) => setErr(String(e)));
  }, []);

  const cityList = useMemo(() => {
    if (!data) return [];
    const cs = Object.keys(data.cities);
    cs.sort((a, b) => data.cities[b].lines.filter(x => x.cut).length - data.cities[a].lines.filter(x => x.cut).length);
    return cs;
  }, [data]);

  const C = data && city ? data.cities[city] : null;
  const lines = C ? C.lines : [];
  const byKey = useMemo(() => { const m = {}; for (const l of lines) m[l.mk + "_" + l.dir] = l; return m; }, [lines]);

  // ---- consolidation families at slider tau ----
  const families = useMemo(() => {
    if (!C || !data) return [];
    const ss = data.stopSets;
    const adj = {};
    for (const [a, b, v] of C.edges) { adj[a + "|" + b] = v; adj[b + "|" + a] = v; }
    const byLt = {};
    for (const [a, b] of C.edges) {
      const lt = C.makats[a]?.lt;
      byLt[lt] = byLt[lt] || new Set();
      byLt[lt].add(a); byLt[lt].add(b);
    }
    const fams = [];
    for (const lt in byLt) {
      for (const clq of cliqueCover([...byLt[lt]], adj, tau)) {
        if (clq.length < 2) continue;
        const mem = clq.map((mk) => ({ mk, ...C.makats[mk], stops: (ss[mk] || []).length }));
        // within-family unique stops (from stop sets, NOT col14)
        for (const m of mem) {
          const others = new Set();
          for (const o of mem) if (o.mk !== m.mk) for (const s of (ss[o.mk] || [])) others.add(s);
          m.uniq = (ss[m.mk] || []).filter((s) => !others.has(s)).length;
        }
        // pair overlaps + min
        let mn = 1; const pairs = [];
        for (let i = 0; i < clq.length; i++) for (let j = i + 1; j < clq.length; j++) {
          const v = adj[clq[i] + "|" + clq[j]] || 0; pairs.push([i, j, v]); mn = Math.min(mn, v);
        }
        // keep/fold: rank by ridership desc, tie<15% by lower cpp
        const ranked = [...mem].sort((a, b) => (b.rid - a.rid) || ((a.cpp || 1e9) - (b.cpp || 1e9)));
        const keeps = [ranked[0].mk];
        const maxCov = mem.reduce((p, c) => c.stops > p.stops ? c : p, mem[0]);
        if (maxCov.mk !== ranked[0].mk) keeps.push(maxCov.mk); // never fold higher-coverage into lower
        if (mem.length >= 5 && keeps.length < 2) keeps.push(ranked[1].mk);
        const keepSet = new Set(keeps);
        const keepStops = new Set(); for (const k of keeps) for (const s of (ss[k] || [])) keepStops.add(s);
        const folds = mem.filter((m) => !keepSet.has(m.mk)).map((m) => {
          const lost = (ss[m.mk] || []).filter((s) => !keepStops.has(s));
          let into = keeps[0], bestv = -1;
          for (const k of keeps) { const v = adj[m.mk + "|" + k] || 0; if (v > bestv) { bestv = v; into = k; } }
          return { mk: m.mk, ln: m.ln, into, intoLn: C.makats[into]?.ln, lost: lost.length, trips: m.trips, wkm: m.wkm };
        });
        fams.push({ lt, mem, pairs, min: mn, keeps, keepSet, folds, foldKm: folds.reduce((s, f) => s + f.wkm, 0), foldTrips: folds.reduce((s, f) => s + f.trips, 0), lostStops: folds.reduce((s, f) => s + f.lost, 0) });
      }
    }
    fams.sort((a, b) => b.mem.length - a.mem.length || b.foldKm - a.foldKm);
    return fams;
  }, [C, tau, data]);

  const cutLines = useMemo(() => {
    let a = lines.filter((l) => l.cut);
    a = a.sort((x, y) => sortCut === "wkm" ? y.wkm - x.wkm : (y.ratio || 0) - (x.ratio || 0));
    return a;
  }, [lines, sortCut]);
  const freqLines = useMemo(() => lines.filter((l) => l.verdict !== "HOLD").sort((a, b) => Math.abs(b.dTrips) - Math.abs(a.dTrips)), [lines]);

  // ---- scenario engine ----
  function toggle(change) {
    setScenario((s) => {
      const n = { ...s };
      if (n[change.key]) delete n[change.key]; else n[change.key] = change;
      return n;
    });
  }
  const claimed = useMemo(() => { const c = new Set(); for (const k in scenario) for (const mk of scenario[k].claims) c.add(mk); return c; }, [scenario]);
  function conflict(change) { return change.claims.some((mk) => claimed.has(mk) && !scenario[change.key]); }

  const impact = useMemo(() => {
    let dkm = 0, dtrips = 0, dRid = 0, lost = 0, postureOut = 0, divergent = 0;
    for (const k in scenario) {
      const ch = scenario[k];
      dkm += ch.dkm; dtrips += ch.dtrips; dRid += ch.dRid || 0; lost += ch.lost || 0;
      postureOut += ch.postureOut || 0; if (ch.divergent) divergent++;
    }
    return { dkm, dtrips, dRid, lost, postureOut, divergent, n: Object.keys(scenario).length };
  }, [scenario]);

  if (err) return <div className="p-6 text-red-300 font-bold">שגיאה בטעינת הנתונים: {err}</div>;
  if (!data || !city || !C) return <div className="p-6 text-slate-400">טוען נתונים…</div>;

  // change builders
  const cutFullChange = (l) => ({
    key: "cut:" + l.mk + "_" + l.dir, type: "ביטול קו", label: `קו ${l.ln} (${l.oc}→${l.dc || l.oc})`,
    claims: [l.mk + "_" + l.dir], dkm: -l.wkm, dtrips: -l.trips, dRid: -(l.rid || 0) * l.trips / 1000,
    lost: l.coveredBy ? 0 : null, postureOut: l.ratio > 1.25 ? 1 : 0, divergent: l.kmDiv,
  });
  const cutPartialChange = (l) => {
    const lowKm = +(l.lowTrips * l.dist).toFixed(1);
    return { key: "thin:" + l.mk + "_" + l.dir, type: "דילול נסיעות", label: `קו ${l.ln} — ${l.lowTrips} נסיעות שפל`,
      claims: [l.mk + "_" + l.dir], dkm: -lowKm, dtrips: -l.lowTrips, dRid: 0, lost: 0, postureOut: 0, divergent: l.kmDiv };
  };
  const freqChange = (l, f) => ({
    key: "freq:" + l.mk + "_" + l.dir, type: "שינוי תדירות", label: `קו ${l.ln} ×${f.toFixed(2)}`,
    claims: [l.mk + "_" + l.dir], dkm: +(l.wkm * (f - 1)).toFixed(1), dtrips: Math.round(l.trips * (f - 1)),
    dRid: 0, lost: 0, postureOut: 0, divergent: l.kmDiv, factor: f,
  });
  const mergeChange = (fam) => {
    const claims = []; for (const f of fam.folds) claims.push(f.mk + "_1", f.mk + "_2");
    return { key: "merge:" + fam.keeps.join("-") + ":" + fam.folds.map(f => f.mk).join("-"),
      type: "מיזוג משפחה", label: `קיפול ${fam.folds.length} קווים לקו ${fam.mem.find(m => m.mk === fam.keeps[0]).ln}`,
      claims, dkm: -fam.foldKm, dtrips: -fam.foldTrips, dRid: 0, lost: fam.lostStops, postureOut: 0, divergent: false };
  };

  function exportScenario() {
    const rows = Object.values(scenario).map((c) => ({ type: c.type, label: c.label, dWeeklyKm: c.dkm, dTrips: c.dtrips }));
    const blob = new Blob([JSON.stringify({ city, tau, changes: rows, net: impact }, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `reform-${city}.json`; a.click();
  }

  const base = C.baseline;
  const baseKm = base.weeklyKm || 1;

  return (
    <div className="min-h-screen flex flex-col">
      {/* header */}
      <header className="px-4 py-3 bg-slate-800 border-b border-slate-700 flex items-center gap-3 flex-wrap">
        <div>
          <h1 className="text-lg font-black m-0">🛠️ מתכנן הרפורמה <span className="text-sky-400">·</span> <span className="text-slate-300 font-bold">הקו הבוחן</span></h1>
          <div className="text-[12px] text-slate-400">בונה תרחישי שינוי לקווים בעיר — איחוד, ביטול/דילול, ותדירות. כל מספר מעוגן בעמודות הנתונים, בלי המצאות.</div>
        </div>
        <div className="flex-1" />
        <select value={city} onChange={(e) => { setCity(e.target.value); setScenario({}); }}
          className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 font-bold text-sm min-w-[180px]">
          {cityList.map((c) => <option key={c} value={c}>{c} ({data.cities[c].lines.filter(x => x.cut).length} למחיקה?)</option>)}
        </select>
      </header>

      {/* baseline strip */}
      <div className="px-4 py-3 bg-slate-900/60 border-b border-slate-800 grid gap-2" style={{ gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))" }}>
        <Stat label="קווים בעיר" value={nf(base.lines)} />
        <Stat label='ק"מ שבועיים (סהכ)' value={nf(base.weeklyKm)} sub="עמודה מקורית — מדויק" />
        <Stat label="נסיעות שבועיות" value={nf(base.trips)} />
        <Stat label="יקרים מהסטנדרט" value={nf(base.posture.worse)} color="#f87171" sub={`${base.posture.eff} יעילים · ${base.posture.par} בסטנדרט`} />
        <Stat label="מדד נוסעים (יחסי)" value={nf(base.ridersIndex)} sub="יחידות לא ודאיות" />
      </div>

      {/* body: 3 panes */}
      <div className="flex-1 grid gap-0" style={{ gridTemplateColumns: "minmax(0,1fr) 320px" }}>
        {/* center */}
        <div className="min-w-0 flex flex-col">
          <div className="flex gap-1 px-4 pt-3 border-b border-slate-800">
            {[["consolidate", "🔗 איחוד קווים", families.length], ["cut", "✂️ ביטול / דילול", cutLines.length], ["freq", "📊 תדירות", freqLines.length], ["newlines", "🆕 קווים חדשים", ""]].map(([k, t, n]) => (
              <button key={k} onClick={() => setTab(k)}
                className={cls("px-3 py-2 rounded-t-lg text-sm font-bold border-b-2", tab === k ? "border-sky-400 text-sky-300 bg-slate-800/50" : "border-transparent text-slate-400 hover:text-slate-200")}>
                {t} {n !== "" && <span className="text-slate-500">({n})</span>}
              </button>
            ))}
            {tab === "consolidate" && (
              <div className="ms-auto flex items-center gap-2 pb-2 text-xs text-slate-400">
                <span>סף חפיפה τ:</span>
                <input type="range" min="0.70" max="0.95" step="0.01" value={tau} onChange={(e) => setTau(+e.target.value)} className="w-40" />
                <span className="font-mono font-bold text-sky-300">{tau.toFixed(2)}</span>
              </div>
            )}
          </div>

          <div className="p-4 overflow-y-auto scroll" style={{ maxHeight: "calc(100vh - 220px)" }}>
            {tab === "consolidate" && <Consolidate fams={families} tau={tau} ss={data.stopSets} scenario={scenario} toggle={toggle} conflict={conflict} mergeChange={mergeChange} />}
            {tab === "cut" && <CutTable rows={cutLines} sort={sortCut} setSort={setSortCut} natl={data.nationalCpp} byKey={byKey}
              scenario={scenario} toggle={toggle} conflict={conflict} cutFullChange={cutFullChange} cutPartialChange={cutPartialChange} />}
            {tab === "freq" && <FreqView rows={freqLines} all={lines} scenario={scenario} toggle={toggle} conflict={conflict} freqChange={freqChange} />}
            {tab === "newlines" && <NewLines nl={nl} err={nlErr} city={city} />}
          </div>
        </div>

        {/* left: scenario summary */}
        <aside className="bg-slate-900 border-r border-slate-800 p-3 sticky top-0 self-start" style={{ height: "calc(100vh - 150px)", overflowY: "auto" }}>
          <div className="text-sm font-black mb-2 text-slate-200">📋 תרחיש הרפורמה <span className="text-slate-500 font-bold">({impact.n} שינויים)</span></div>
          <div className="bg-slate-800 rounded-xl p-3 mb-2 border border-slate-700">
            <div className="text-[12px] text-slate-400 font-bold">שינוי נטו בק"מ שבועיים</div>
            <div className="text-3xl font-black" style={{ color: impact.dkm < 0 ? "#4ade80" : impact.dkm > 0 ? "#fbbf24" : "#e2e8f0" }}>
              {impact.dkm > 0 ? "+" : ""}{nf(impact.dkm)}
            </div>
            <div className="text-[12px] text-slate-400">{pct(100 * impact.dkm / baseKm)} מהק"מ של העיר</div>
            {impact.divergent > 0 && <div className="text-[11px] text-amber-400 mt-1">⚠ כולל {impact.divergent} קווים עם ק"מ משוחזר (±עד כמה אחוזים)</div>}
          </div>
          <div className="grid grid-cols-2 gap-2 mb-2">
            <Stat label="Δ נסיעות/שבוע" value={(impact.dtrips > 0 ? "+" : "") + nf(impact.dtrips)} color={impact.dtrips < 0 ? "#4ade80" : "#fbbf24"} />
            <Stat label="תחנות שמאבדות שירות" value={nf(impact.lost)} color={impact.lost > 0 ? "#f87171" : "#4ade80"} sub="ספירה — בדיקה ידנית" />
            <Stat label="מדד נוסעים יחסי" value={(impact.dRid >= 0 ? "+" : "") + nf(impact.dRid, 1)} sub="לא ₪, לא נוסעים מוחלטים" />
            <Stat label="יצאו מ׳יקר מהסטנדרט׳" value={nf(impact.postureOut)} color="#a7f3d0" />
          </div>
          <div className="text-[11px] text-slate-500 leading-relaxed mb-2">
            הסיכום מתעדכן חי. קו (מק"ט+כיוון) יכול להופיע בשינוי אחד בלבד — התנגשויות נחסמות כדי שהמספרים לא ייספרו פעמיים.
          </div>
          <div className="flex gap-2">
            <button onClick={exportScenario} disabled={!impact.n} className="flex-1 bg-sky-600 disabled:opacity-40 text-white rounded-lg py-2 text-sm font-bold">ייצוא תרחיש</button>
            <button onClick={() => setScenario({})} disabled={!impact.n} className="bg-slate-700 disabled:opacity-40 text-white rounded-lg py-2 px-3 text-sm font-bold">איפוס</button>
          </div>
          {impact.n > 0 && (
            <div className="mt-3 space-y-1">
              {Object.values(scenario).map((c) => (
                <div key={c.key} className="flex items-center gap-2 text-[12px] bg-slate-800/60 rounded-lg px-2 py-1">
                  <button onClick={() => toggle(c)} className="text-red-400 font-black">×</button>
                  <span className="text-slate-300 flex-1 truncate">{c.label}</span>
                  <span className="font-mono" style={{ color: c.dkm < 0 ? "#4ade80" : "#fbbf24" }}>{c.dkm > 0 ? "+" : ""}{nf(c.dkm)} ק"מ</span>
                </div>
              ))}
            </div>
          )}
        </aside>
      </div>

      {/* footer disclaimer */}
      <footer className="px-4 py-2 bg-slate-950 border-t border-slate-800 text-[11px] text-slate-500 leading-relaxed">
        ק"מ ותדירות = יחידות מדויקות מהעמודות. נוסעים/עומס = מדד יחסי (יחידות לא ודאיות). אין כאן חיסכון ב-₪, אין ספירת נוסעים מוחלטת,
        אין נתוני עלייה לפי תחנה, ואין ביקוש מוצא-יעד. עלות לנוסע מושווית לקבוצת השווים של הקו (סוג-יעילות × אזור) —
        ולא ל"ממוצע ארצי" יחיד (פשוט {data.nationalCpp.simpleMean} / משוקלל-נסיעות {data.nationalCpp.tripWeighted} / משוקלל-נוסעים {data.nationalCpp.ridershipWeighted} / חציון {data.nationalCpp.median} ₪).
        <br /><span className="text-slate-400">📖 תקני הייחוס מבוססים על <b>הנחיות משרד התחבורה לתכנון ותפעול שירות תח"צ באוטובוסים (2016)</b>: מרחק הליכה לתחנה 400&ndash;500 מ׳ (80% מהאוכלוסייה), תדירות שירות אחת ל-12&ndash;15 דק׳ (המתנה ממוצעת ≤7.5 דק׳), ומרחק בין תחנות עירוני 250&ndash;500 מ׳.</span>
        כל המלצה היא מועמדת לבדיקת מתכנן אנושי. פרוטוטייפ — לא רשמי.
      </footer>
    </div>
  );
}

// ---------- Consolidate ----------
function Consolidate({ fams, tau, ss, scenario, toggle, conflict, mergeChange }) {
  if (!fams.length) return <div className="text-slate-400 text-sm">אין משפחות קווים חופפות בעיר זו בסף הנוכחי (τ={tau.toFixed(2)}). הורד את הסף כדי לראות חפיפות רכות יותר.</div>;
  return (
    <div className="space-y-3">
      <div className="text-[12px] text-slate-400">{fams.length} משפחות · {fams.reduce((s, f) => s + f.folds.length, 0)} קווים ניתנים לקיפול (בסף τ={tau.toFixed(2)}). חפיפה = מקדם הכלה (אסימטרי): "קו קצר מוכל בארוך", לא "זהים".</div>
      {fams.map((fam, fi) => <Family key={fi} fam={fam} tau={tau} ss={ss} scenario={scenario} toggle={toggle} conflict={conflict} mergeChange={mergeChange} />)}
    </div>
  );
}
function Family({ fam, tau, ss, scenario, toggle, conflict, mergeChange }) {
  const ch = mergeChange(fam);
  const on = !!scenario[ch.key];
  const bad = fam.min < tau - 1e-9; // hard fail: not a real clique at current tau
  const n = fam.mem.length;
  return (
    <div className={cls("rounded-xl border p-3", bad ? "border-red-700 bg-red-950/30" : "border-slate-700 bg-slate-800/50")}>
      <div className="flex items-center gap-2 flex-wrap">
        <div className="font-bold text-sm">{n} קווים חופפים ({fam.lt}) · חפיפה מינימלית במשפחה: <span className="font-mono" style={{ color: bad ? "#f87171" : "#4ade80" }}>{(fam.min * 100).toFixed(0)}%</span></div>
        <div className="flex-1" />
        {bad ? <span className="text-[11px] font-bold text-red-300 bg-red-900/50 px-2 py-1 rounded">⚠ לא "קליק" בסף זה — לבדיקה ידנית</span>
          : <button onClick={() => toggle(ch)} disabled={conflict(ch)}
            className={cls("text-xs font-bold rounded-lg px-3 py-1.5", on ? "bg-emerald-600 text-white" : conflict(ch) ? "bg-slate-700 text-slate-500" : "bg-slate-700 hover:bg-slate-600 text-slate-200")}>
            {on ? "✓ בתרחיש" : conflict(ch) ? "מתנגש" : "הוסף לתרחיש"}</button>}
      </div>
      {/* heatmap */}
      <div className="my-2 inline-block">
        <table className="border-collapse">
          <tbody>
            {fam.mem.map((rm, i) => (
              <tr key={i}>
                <td className="text-[10px] text-slate-400 pe-1 font-mono">{rm.ln}</td>
                {fam.mem.map((cm, j) => {
                  if (i === j) return <td key={j} className="w-6 h-6 text-center text-[9px] text-slate-600 border border-slate-800">—</td>;
                  const v = fam.pairs.find((p) => (p[0] === i && p[1] === j) || (p[0] === j && p[1] === i));
                  const ov = v ? v[2] : 0;
                  const sub = ov < tau;
                  return <td key={j} title={(ov * 100).toFixed(0) + "%"}
                    className="w-6 h-6 text-center text-[9px] border border-slate-800 font-bold"
                    style={{ background: sub ? "#7f1d1d" : `rgba(74,222,128,${0.2 + 0.6 * (ov - 0.7) / 0.3})`, color: sub ? "#fecaca" : "#06281b" }}>
                    {sub ? "✕" : (ov * 100).toFixed(0)}</td>;
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {/* members */}
      <div className="space-y-1">
        {fam.mem.slice().sort((a, b) => b.stops - a.stops).map((m) => {
          const keep = fam.keepSet.has(m.mk);
          const fold = fam.folds.find((f) => f.mk === m.mk);
          return (
            <div key={m.mk} className={cls("flex items-center gap-2 text-[12px] rounded-lg px-2 py-1", keep ? "bg-emerald-900/30 border border-emerald-800" : "bg-slate-900/50")}>
              <span className="font-mono font-black w-10">{m.ln}</span>
              {keep ? <span className="text-emerald-400 font-bold">★ נשאר</span>
                : <span className="text-slate-400">↳ קפל לקו {fold?.intoLn}</span>}
              <span className="text-slate-400">{m.stops} תח׳</span>
              <span className="text-slate-500">· {nf(m.trips)} נסיעות</span>
              <span className="text-slate-500">· ₪{nf(m.cpp, 1)}/נוסע</span>
              {m.uniq > 0 && <span className="text-amber-400" title="תחנות שאף קו אחר במשפחה לא משרת">ייחודי: {m.uniq} תח׳</span>}
              {fold && fold.lost > 0 && <span className="text-red-300 font-bold" title="תחנות שמאבדות שירות אם מקפלים">מאבד {fold.lost} תח׳</span>}
            </div>
          );
        })}
      </div>
      {fam.lostStops > 0 && <div className="text-[11px] text-amber-400 mt-2">⚠ קיפול המשפחה הזו מאבד {fam.lostStops} תחנות שאינן מכוסות ע"י הקו הנשאר — שמירת זנב נדרשת.</div>}
    </div>
  );
}

// ---------- Cut table ----------
function CutTable({ rows, sort, setSort, natl, byKey, scenario, toggle, conflict, cutFullChange, cutPartialChange }) {
  const [open, setOpen] = useState(null);
  if (!rows.length) return <div className="text-slate-400 text-sm">אין קווים שסומנו לבחינת ביטול בעיר זו (יחס עלות ≥3× מקבוצת השווים וגם נוסעים ברבעון התחתון).</div>;
  return (
    <div>
      <div className="flex items-center gap-2 text-xs text-slate-400 mb-2">
        <span>{rows.length} קווים מסומנים. מיון:</span>
        <button onClick={() => setSort("ratio")} className={cls("px-2 py-1 rounded font-bold", sort === "ratio" ? "bg-sky-700 text-white" : "bg-slate-700")}>יחס לקבוצת השווים</button>
        <button onClick={() => setSort("wkm")} className={cls("px-2 py-1 rounded font-bold", sort === "wkm" ? "bg-sky-700 text-white" : "bg-slate-700")}>ק"מ שבועיים</button>
      </div>
      <div className="space-y-1">
        {rows.map((l) => {
          const k = l.mk + "_" + l.dir;
          const full = cutFullChange(l), part = cutPartialChange(l);

          return (
            <div key={k} className="rounded-lg border border-slate-700 bg-slate-800/50">
              <div className="flex items-center gap-2 px-2 py-1.5 text-[12px] cursor-pointer" onClick={() => setOpen(isOpen ? null : k)}>
                <span className="font-mono font-black w-10">{l.ln}</span>
                <span className="text-slate-300 flex-1 truncate">{l.oc}{l.dc && l.dc !== l.oc ? "→" + l.dc : ""} <span className="text-slate-500">· {l.eg}</span></span>
                <span className="text-amber-300 font-bold" title={`₪${l.cpp}/נוסע מול ₪${l.peer} בקבוצת השווים`}>
                  {l.cens ? "≥" : ""}{nf(l.ratio, 1)}× <span className="text-slate-500 font-normal">שווים</span>{l.cens && <span className="text-red-400" title="עלות מצונזרת ב-1000 ₪ — היחס הוא חסם תחתון"> (מצונזר)</span>}
                </span>
                <span className="text-slate-400 w-20 text-left">{nf(l.wkm)} ק"מ</span>
                <span className={cls("text-[11px] font-bold px-2 py-0.5 rounded", l.coveredBy ? "bg-sky-900 text-sky-200" : "bg-rose-900 text-rose-200")}>
                  {l.coveredBy ? "מכוסה ע״י קו " + (byKey[l.coveredBy + "_1"]?.ln || byKey[l.coveredBy + "_2"]?.ln || "אחר") : "ביטול"}</span>
              </div>
              {isOpen && (
                <div className="px-3 pb-2 pt-1 border-t border-slate-700 text-[12px] space-y-2">
                  <div className="flex gap-4 text-slate-400 flex-wrap">
                    <span>עלות/נוסע: <b className="text-slate-200">₪{nf(l.cpp, 1)}</b></span>
                    <span>קבוצת שווים: <b className="text-slate-200">₪{nf(l.peer, 1)}</b></span>
                    <span>אחוזון נוסעים: <b className="text-slate-200">{nf(l.ridP, 0)}</b></span>
                    <span>נסיעות/שבוע: <b className="text-slate-200">{nf(l.trips)}</b></span>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="text-slate-400">פרופיל עומס:</span><Spark data={l.hourly} />
                    <span className="text-slate-500 text-[11px]">דילול ברמת נסיעה/שעה בלבד — אין נתוני עלייה לפי תחנה.</span>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => toggle(full)} disabled={conflict(full)} className={cls("rounded-lg px-3 py-1.5 text-xs font-bold", onFull ? "bg-rose-600 text-white" : conflict(full) ? "bg-slate-700 text-slate-500" : "bg-slate-700 hover:bg-slate-600")}>
                      {onFull ? "✓ ביטול מלא בתרחיש" : "בטל קו (−" + nf(l.wkm) + " ק\"מ)"}</button>
                    <button onClick={() => toggle(part)} disabled={conflict(part) || !l.lowTrips} className={cls("rounded-lg px-3 py-1.5 text-xs font-bold", onPart ? "bg-amber-600 text-white" : (conflict(part) || !l.lowTrips) ? "bg-slate-700 text-slate-500" : "bg-slate-700 hover:bg-slate-600")}>
                      {onPart ? "✓ דילול בתרחיש" : l.lowTrips ? "דלל " + l.lowTrips + " נסיעות שפל" : "אין נסיעות שפל"}</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------- Frequency ----------
function FreqView({ rows, all, scenario, toggle, conflict, freqChange }) {
  const [open, setOpen] = useState(null);
  // quadrant scatter dims
  const W = 280, H = 200;
  return (
    <div>
      <div className="flex gap-4 flex-wrap items-start">

          <div className="text-[12px] text-slate-400 mb-1">מפת רבעונים: ציר X = היצע (אחוזון נסיעות), ציר Y = עומס יחסי (אחוזון). אדום=להגביר, כחול=להפחית.</div>
          <svg width={W} height={H} className="bg-slate-900 rounded-lg border border-slate-800">
            <line x1="0" y1={H / 2} x2={W} y2={H / 2} stroke="#1e293b" /><line x1={W / 2} y1="0" x2={W / 2} y2={H} stroke="#1e293b" />
            <text x="4" y="12" fill="#f87171" fontSize="9">עמוס + נדיר → הגבר</text>

                fill={VERDICT_COLOR[l.verdict]} fillOpacity={l.verdict === "HOLD" ? 0.25 : 0.8}>
                <title>{`קו ${l.ln} ${l.oc}→${l.dc || ""} · עומס/נסיעה ${l.lpt} · ${VERDICT_HE[l.verdict]}`}</title>
              </circle>
            ))}
          </svg>
        </div>
        <div className="flex-1 min-w-[260px]">
          <div className="text-[12px] text-slate-400 mb-2">{rows.length} קווים עם המלצה. Δנסיעות מכוון בלבד (חסום ±50%), לא לוח-זמנים. עומס = מדד יחסי לקבוצת השווים.</div>
          <div className="text-[11px] text-sky-300/80 bg-sky-950/30 border border-sky-900 rounded px-2 py-1 mb-2">📖 תקן משרד התחבורה (2016): תדירות שירות אחת ל-12&ndash;15 דק׳, זמן המתנה ממוצע ≤7.5 דק׳ (מרווח ≤15 דק׳ בין נסיעות) ברוב שעות היום.</div>
          <div className="space-y-1 max-h-[40vh] overflow-y-auto scroll">
            {rows.map((l) => {
              const k = l.mk + "_" + l.dir;
              const f = l.verdict === "ADD" ? 1.25 : l.verdict === "CUT" ? 0.8 : 1;
              const ch = freqChange(l, f);
              const on = !!scenario[ch.key];
              const isOpen = open === k;
              return (
                <div key={k} className="rounded-lg border border-slate-700 bg-slate-800/50">
                  <div className="flex items-center gap-2 px-2 py-1.5 text-[12px] cursor-pointer" onClick={() => setOpen(isOpen ? null : k)}>
                    <span className="font-mono font-black w-9">{l.ln}</span>
                    <span className="font-bold" style={{ color: VERDICT_COLOR[l.verdict] }}>{VERDICT_HE[l.verdict]}</span>
                    {l.addPeakOnly && <span className="text-[10px] bg-amber-900 text-amber-200 px-1.5 rounded">שיא בלבד</span>}
                    <span className="text-slate-500 flex-1 truncate">{l.oc}{l.dc && l.dc !== l.oc ? "→" + l.dc : ""}</span>
                    <span className="text-slate-400">עומס/נסיעה {nf(l.lpt, 1)}</span>
                    {l.dTrips !== 0 && <span className="font-mono" style={{ color: l.dTrips > 0 ? "#f87171" : "#60a5fa" }}>{l.dTrips > 0 ? "+" : ""}{l.dTrips}</span>}
                  </div>
                  {isOpen && (
                    <div className="px-3 pb-2 pt-1 border-t border-slate-700 text-[12px] space-y-2">
                      <div className="flex items-center gap-3"><span className="text-slate-400">פרופיל:</span><Spark data={l.hourly} color={VERDICT_COLOR[l.verdict]} /></div>
                      {(l.verdict === "ADD" || l.verdict === "CUT") &&
                        <button onClick={() => toggle(ch)} disabled={conflict(ch)} className={cls("rounded-lg px-3 py-1.5 text-xs font-bold", on ? "bg-sky-600 text-white" : conflict(ch) ? "bg-slate-700 text-slate-500" : "bg-slate-700 hover:bg-slate-600")}>

                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>

}

// ---------- New lines (coverage gaps + candidate corridors) ----------
function NewLines({ nl, err, city }) {
  const mapRef = useRef(null);
  const elRef = useRef(null);
  const [sel, setSel] = useState(null);
  const C = nl && nl.cities ? nl.cities[city] : null;

  useEffect(() => {
    if (!nl || !elRef.current || !window.L) return;
    if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }
    const m = L.map(elRef.current, { center: [31.7, 35.0], zoom: 12, scrollWheelZoom: true });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "© OpenStreetMap", maxZoom: 19 }).addTo(m);
    mapRef.current = m;
    const pts = [];
    if (C) {
      // each candidate corridor gets its own colour: route polyline + origin + hub all match.
      // (the raw gap-cell dots are intentionally not drawn — they are grid noise; the routes
      //  are the actionable output. Real neighbourhood placement awaits the CBS layer.)
      C.stubs.forEach((s, i) => {
        const col = ROUTE_PAL[i % ROUTE_PAL.length];
        const km = s.roadKm != null ? s.roadKm : s.km;
        const line = s.path && s.path.length > 1 ? s.path : [[s.lat, s.lon], [s.hubLat, s.hubLon]];
        L.polyline(line, { color: col, weight: 4, dashArray: s.path ? null : "7 6", opacity: 0.92 }).addTo(m);
        L.circleMarker([s.lat, s.lon], { radius: 8, color: "#0f172a", weight: 2, fillColor: col, fillOpacity: 0.97 })
          .bindTooltip(String(i + 1), { permanent: true, direction: "center", className: "rt-lbl" })
          .bindPopup(`<b style="color:${col}">מועמד #${i + 1} לקו חדש</b>${s.homes != null ? ` · ~${nf(s.homes)} מבני מגורים בטווח 400 מ׳` : ""} · עד ${s.maxM} מ׳ מתחנה${s.pop ? ` · ~${nf(s.pop)} תושבים` : ""}<br>חיבור לקו-על ${s.hubSid} (${s.hubCity}, ${s.hubLines} קווים) · ${s.roadKm != null ? "כביש" : "קו אווירי"} ~${km} ק"מ`).addTo(m);
        L.circleMarker([s.hubLat, s.hubLon], { radius: 6, color: col, weight: 3, fillColor: "#0f172a", fillOpacity: 0.95 })
          .bindPopup(`קו-על ${s.hubSid} · ${s.hubCity} · ${s.hubLines} קווים`).addTo(m);
        pts.push([s.lat, s.lon], [s.hubLat, s.hubLon]);
      });
    }
    if (pts.length) m.fitBounds(pts, { padding: [40, 40], maxZoom: 14 });
    else { // national hubs fallback
      for (const h of (nl.hubs || []).slice(0, 60)) L.circleMarker([h.lat, h.lon], { radius: 4, color: "#2563eb", fillColor: "#60a5fa", fillOpacity: 0.8, weight: 1 }).bindPopup(`קו-על ${h.sid} · ${h.city} · ${h.lines} קווים`).addTo(m);
      m.setView([31.7, 35.0], 8);
    }
    setTimeout(() => m.invalidateSize(), 100);
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, [nl, city]);

  if (err) return <div className="text-amber-300 text-sm p-2">שכבת הקווים החדשים עדיין לא זמינה ({err}). היא נבנית ב-GitHub Action (נדרשות קואורדינטות GTFS) ותופיע לאחר ההרצה.</div>;
  if (!nl) return <div className="text-slate-400 text-sm p-2">טוען שכבת כיסוי…</div>;

  return (
    <div>
      <div className="bg-amber-950/40 border border-amber-800 rounded-lg px-3 py-2 text-[12px] text-amber-200 mb-2 leading-relaxed">
        ⚠ <b>טיוטה.</b> "מועמד לקו חדש" = שטח <b>בנוי-מגורים</b> (מוקף בתים, מחוץ לאזורי תעשייה/מסחר/פארק/חקלאות ב-OSM) שחורג מ<b>תקן ההליכה של משרד התחבורה (400 מ׳ לתחנה</b>, 2016) ועד 1100 מ׳, ומוקף בתחנות. הנקודה מוצמדת לבית והמסלול מנותב על כבישים.
        המועמדים מדורגים לפי <b>מספר מבני המגורים בטווח 400 מ׳</b> (פרוקסי ל"כמה בתי-אב יֵהנו"). אין כאן נתוני ביקוש מוצא-יעד{nl.hasPopulation ? "" : " ולא ספירת תושבים מדויקת (תבוא מנתוני הלמ\"ס)"}. כל מועמד הוא טיוטה לבדיקת מתכנן, לא המלצה.
      </div>
      {!C && <div className="text-slate-400 text-sm mb-2">אין נתוני כיסוי לעיר {city} (מעט תחנות או ללא פערים). מוצגים קווי-העל הארציים.</div>}
      {C && (
        <div className="flex gap-2 flex-wrap mb-2">
          <Stat label="פערי כיסוי בעיר" value={nf(C.gaps.length)} color="#fbbf24" />
          <Stat label="מרחק הליכה מקסימלי לתחנה" value={nf(C.maxGapM) + " מ׳"} />
          <Stat label="מועמדים לקו חדש" value={nf(C.stubs.length)} color="#f87171" />
          <Stat label="תחנות בעיר" value={nf(C.stopCount)} />
        </div>
      )}
      <div ref={elRef} style={{ height: "52vh", minHeight: "320px", borderRadius: "12px", overflow: "hidden", border: "1px solid #334155" }} />
      {C && C.stubs.length > 0 && (
        <div className="mt-2 space-y-1">
          <div className="text-[12px] text-slate-400 font-bold">מועמדים לקו חדש — מדורגים לפי מבני מגורים (לחיצה תמרכז במפה):</div>
          {C.stubs.map((s, i) => (
            <div key={i} onClick={() => mapRef.current && mapRef.current.setView([s.lat, s.lon], 14)}
              className="flex items-center gap-2 text-[12px] bg-slate-800/60 rounded-lg px-2 py-1 cursor-pointer hover:bg-slate-700/60">
              <span className="font-black text-white rounded-full w-5 h-5 flex items-center justify-center" style={{ background: ROUTE_PAL[i % ROUTE_PAL.length], fontSize: "11px" }}>{i + 1}</span>
              <span className="text-slate-300 flex-1">{s.homes != null ? <b className="text-emerald-300">~{nf(s.homes)} מבני מגורים</b> : "מועמד לקו"} · עד {s.maxM} מ׳ מתחנה{s.pop ? ` · ~${nf(s.pop)} תושבים` : ""}</span>
              <span className="text-sky-300">→ קו-על {s.hubSid} ({s.hubCity})</span>
              <span className="text-slate-400 font-mono" title={s.roadKm != null ? "אורך מסלול על כבישים" : "מרחק אווירי"}>~{s.roadKm != null ? s.roadKm : s.km} ק"מ{s.roadKm != null ? " 🛣️" : ""}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
